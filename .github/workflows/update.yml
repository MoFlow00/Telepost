```yml id="jlwm213"
name: Update Channels

on:

  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run updater
        run: |
          python update_channels.py

      - name: Commit changes
        run: |

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add channels_data.json

          git diff --cached --quiet || git commit -m "Update channels data"

          git push
```
