name: Update Channels

on:

  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

jobs:

  update:

    runs-on: ubuntu-latest

    timeout-minutes: 45

    steps:

      # ─────────────────────────────
      # CHECKOUT
      # ─────────────────────────────

      - name: Checkout

        uses: actions/checkout@v4

        with:
          fetch-depth: 0

      # ─────────────────────────────
      # PYTHON
      # ─────────────────────────────

      - name: Setup Python

        uses: actions/setup-python@v5

        with:
          python-version: "3.11"

      # ─────────────────────────────
      # CACHE PIP
      # ─────────────────────────────

      - name: Cache pip

        uses: actions/cache@v4

        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ─────────────────────────────
      # INSTALL DEPENDENCIES
      # ─────────────────────────────

      - name: Install dependencies

        run: |

          pip install requests beautifulsoup4

      # ─────────────────────────────
      # PULL BEFORE RUN
      # ─────────────────────────────

      - name: Pull latest

        run: |

          git pull origin main --rebase

      # ─────────────────────────────
      # RUN SCRIPT
      # ─────────────────────────────

      - name: Run updater

        run: |

          python update_channels.py

      # ─────────────────────────────
      # GIT CONFIG
      # ─────────────────────────────

      - name: Git config

        run: |

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      # ─────────────────────────────
      # STAGE
      # ─────────────────────────────

      - name: Stage changes

        run: |

          git add channels_data.json

      # ─────────────────────────────
      # COMMIT
      # ─────────────────────────────

      - name: Commit changes

        run: |

          git commit -m "Auto update $(date)" || echo "No changes"

      # ─────────────────────────────
      # PUSH
      # ─────────────────────────────

      - name: Push changes

        run: |

          git push origin main
