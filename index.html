<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>TELEPOSTS</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet"
>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{

  --bg:#fafafa;
  --surface:#fff;
  --border:#efefef;

  --text:#111;
  --text2:#666;
  --text3:#999;

  --accent:#0095f6;

}

body{

  font-family:'Inter',sans-serif;

  background:var(--bg);

  color:var(--text);

}

/* HEADER */

.header{

  position:sticky;
  top:0;
  z-index:999;

  background:var(--surface);

  border-bottom:
  1px solid var(--border);

  display:flex;
  align-items:center;
  gap:12px;

  padding:12px;

  flex-wrap:wrap;

}

.logo{

  font-size:20px;
  font-weight:700;

}

.logo span{

  color:var(--accent);

}

.search{

  flex:1;

  padding:10px 14px;

  border:none;

  border-radius:14px;

  background:#f1f3f5;

  outline:none;

  font-size:14px;

}

.sort{

  padding:10px 14px;

  border:none;

  border-radius:14px;

  background:#f1f3f5;

  outline:none;

  font-size:14px;

  cursor:pointer;

}

/* FEED */

.feed{

  max-width:650px;

  margin:auto;

  padding-bottom:40px;

}

/* CARD */

.post-card{

  background:var(--surface);

  border-bottom:
  1px solid var(--border);

  overflow:hidden;

}

/* HEAD */

.post-head{

  display:flex;
  align-items:center;
  gap:12px;

  padding:14px;

}

.avatar{

  width:42px;
  height:42px;

  border-radius:50%;

  background:linear-gradient(
    135deg,
    #0095f6,
    #7c3aed
  );

  display:flex;
  align-items:center;
  justify-content:center;

  color:white;

  font-size:14px;
  font-weight:700;

  flex-shrink:0;

}

.post-meta{

  flex:1;
  min-width:0;

}

.post-channel{

  font-size:14px;
  font-weight:600;

  color:var(--text);

  text-decoration:none;

  display:block;

  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;

}

.post-date{

  font-size:11px;

  color:var(--text3);

  margin-top:2px;

}

.open-btn{

  padding:8px 14px;

  border-radius:20px;

  background:var(--accent);

  color:white;

  text-decoration:none;

  font-size:12px;
  font-weight:600;

  flex-shrink:0;

}

/* IMAGE */

.post-img{

  width:100%;

  max-height:450px;

  object-fit:cover;

  display:block;

  background:#eee;

}

/* TEXT */

.post-text{

  padding:14px;

  font-size:14px;

  line-height:1.6;

  word-break:break-word;

}

.post-text a{

  color:var(--accent);

  text-decoration:none;

}

/* FOOT */

.post-foot{

  padding:0 14px 14px;

}

.views{

  font-size:12px;

  color:var(--text3);

}

/* BUTTON */

.load-wrap{

  padding:24px;

  text-align:center;

}

.load-btn{

  padding:12px 26px;

  border:none;

  border-radius:30px;

  background:var(--accent);

  color:white;

  font-size:14px;
  font-weight:600;

  cursor:pointer;

}

.load-btn:disabled{

  opacity:.5;

}

</style>

</head>

<body>

<header class="header">

<div class="logo">

  TELE<span>POSTS</span>

</div>

<input
type="text"
id="search"
class="search"
placeholder="Search channels..."
>

<select
id="sortSelect"
class="sort"
>

  <option value="random">
    🔀 Random
  </option>

  <option value="views">
    🔥 Most Viewed
  </option>

  <option value="az">
    🔤 A-Z
  </option>

</select>

</header>

<div
id="feed"
class="feed"
>
</div>

<script>

const WORKER =
'https://telegram-proxy.mohamed-ahmed408408.workers.dev/?channel=';

const BATCH = 10;

let allChannels = [];

let filteredChannels = [];

let usedIndexes = new Set();

let isLoading = false;

let searchQ = '';

// ─────────────────────────────
// HELPERS
// ─────────────────────────────

function shuffle(arr){

  return arr
  .slice()
  .sort(()=>Math.random()-.5)

}

function avatarText(t){

  if(!t) return '?';

  return t
  .slice(0,2)
  .toUpperCase()

}

function matchSearch(ch,q){

  if(!q) return true;

  return (

    (ch.title || '')
    .toLowerCase()
    .includes(q)

    ||

    (ch.username || '')
    .toLowerCase()
    .includes(q)

  )

}

// ─────────────────────────────
// PARSE TELEGRAM HTML
// ─────────────────────────────

function parseLastPost(html){

  const parser =
  new DOMParser();

  const doc =
  parser.parseFromString(
    html,
    'text/html'
  );

  const posts =
  doc.querySelectorAll(
    '.tgme_widget_message_wrap'
  );

  if(!posts.length)
    return null;

  const last =
  posts[posts.length - 1];

  let text = '';

  const textEl =
  last.querySelector(
    '.tgme_widget_message_text'
  );

  if(textEl){

    text =
    textEl.innerHTML.trim();

  }

  let img = null;

  const imgEl =
  last.querySelector(
    '.tgme_widget_message_photo_wrap'
  );

  if(imgEl){

    const style =
    imgEl.getAttribute(
      'style'
    ) || '';

    const match =
    style.match(
      /url\(['"]?([^'")]+)['"]?\)/
    );

    if(match){

      img = match[1];

    }

  }

  let date = '';

  const dateEl =
  last.querySelector(
    '.tgme_widget_message_date time'
  );

  if(dateEl){

    date =
    dateEl.getAttribute(
      'datetime'
    ) || '';

  }

  let views = '';

  const viewEl =
  last.querySelector(
    '.tgme_widget_message_views'
  );

  if(viewEl){

    views =
    viewEl.textContent.trim();

  }

  return {

    text,
    img,
    date,
    views

  }

}

// ─────────────────────────────
// CARD
// ─────────────────────────────

function makeCard(channel,post){

  const card =
  document.createElement('div');

  card.className =
  'post-card';

  card.innerHTML = `

    <div class="post-head">

      <div class="avatar">

        ${avatarText(
          channel.title ||
          channel.username
        )}

      </div>

      <div class="post-meta">

        <a
        class="post-channel"
        href="https://t.me/${channel.username}"
        target="_blank"
        >

        ${channel.title || channel.username}

        </a>

        <div class="post-date">

          ${post.date || ''}

        </div>

      </div>

      <a
      class="open-btn"
      href="https://t.me/${channel.username}"
      target="_blank"
      >

      Open

      </a>

    </div>

    ${
      post.img

      ?

      `<img
        class="post-img"
        src="${post.img}"
        loading="lazy"
      >`

      :

      ''
    }

    ${
      post.text

      ?

      `<div class="post-text">

        ${post.text}

      </div>`

      :

      ''
    }

    <div class="post-foot">

      <div class="views">

        👁️ ${post.views || 0}

      </div>

    </div>

  `;

  return card;

}

// ─────────────────────────────
// FETCH
// ─────────────────────────────

async function fetchAndRender(channel){

  try{

    const res =
    await fetch(

      WORKER +
      channel.username,

      {
        signal:
        AbortSignal.timeout(8000)
      }

    );

    const html =
    await res.text();

    const post =
    parseLastPost(html);

    if(
      !post
      ||
      (
        !post.text
        &&
        !post.img
      )
    ){

      return;

    }

    channel.lastViews =
    parseInt(

      (post.views || '0')
      .replace(/[^\d]/g,'')

    ) || 0;

    const card =
    makeCard(channel,post);

    const loadWrap =
    document.getElementById(
      'loadWrap'
    );

    document
    .getElementById('feed')
    .insertBefore(
      card,
      loadWrap
    );

  }catch(e){

    console.log(e);

  }

}

// ─────────────────────────────
// LOAD BATCH
// ─────────────────────────────

async function loadBatch(){

  if(isLoading)
    return;

  isLoading = true;

  const btn =
  document.getElementById(
    'loadBtn'
  );

  if(btn){

    btn.disabled = true;

    btn.innerText =
    'Loading...';

  }

  const pending = [];

  for(
    let i=0;
    i<filteredChannels.length;
    i++
  ){

    if(
      pending.length >= BATCH
    ) break;

    if(
      usedIndexes.has(i)
    ) continue;

    usedIndexes.add(i);

    pending.push(

      fetchAndRender(
        filteredChannels[i]
      )

    );

  }

  await Promise.allSettled(
    pending
  );

  isLoading = false;

  if(btn){

    btn.disabled = false;

    btn.innerText =
    'Load More';

  }

}

// ─────────────────────────────
// INIT FEED
// ─────────────────────────────

function initFeed(){

  usedIndexes.clear();

  const feed =
  document.getElementById(
    'feed'
  );

  feed.innerHTML = '';

  const wrap =
  document.createElement(
    'div'
  );

  wrap.className =
  'load-wrap';

  wrap.id =
  'loadWrap';

  wrap.innerHTML = `

    <button
    id="loadBtn"
    class="load-btn"
    >

      Load More

    </button>

  `;

  feed.appendChild(wrap);

  document
  .getElementById('loadBtn')
  .onclick = loadBatch;

  loadBatch();

}

// ─────────────────────────────
// FILTERS
// ─────────────────────────────

function applyFilters(){

  filteredChannels =
  allChannels.filter(ch =>

    ch.username
    &&
    matchSearch(
      ch,
      searchQ
    )

  );

  const sort =
  document.getElementById(
    'sortSelect'
  ).value;

  if(sort === 'random'){

    filteredChannels =
    shuffle(filteredChannels);

  }

  if(sort === 'az'){

    filteredChannels.sort(
      (a,b)=>

      (a.title || a.username)
      .localeCompare(
        b.title || b.username
      )

    );

  }

  if(sort === 'views'){

    filteredChannels.sort(
      (a,b)=>

      (b.lastViews || 0)
      -
      (a.lastViews || 0)

    );

  }

  initFeed();

}

// ─────────────────────────────
// LOAD JSON
// ─────────────────────────────

async function loadChannels(){

  try{

    const r =
    await fetch(
      './channels_data.json'
    );

    allChannels =
    await r.json();

  }catch(e){

    allChannels = [];

  }

  applyFilters();

}

// ─────────────────────────────
// EVENTS
// ─────────────────────────────

document
.getElementById('search')
.addEventListener('input',e=>{

  searchQ =
  e.target.value
  .toLowerCase()
  .trim();

  applyFilters();

});

document
.getElementById('sortSelect')
.addEventListener('change',()=>{

  applyFilters();

});

// ─────────────────────────────

loadChannels();

</script>

</body>

</html>
