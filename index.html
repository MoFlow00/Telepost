<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TELEPOSTS</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{

  --bg:#f5f7fb;
  --surface:#ffffff;
  --border:#e6ebf2;

  --text:#111111;
  --text2:#666666;
  --text3:#9aa4b2;

  --accent:#0095f6;

  --tag-bg:#eef2f7;

}

@media(prefers-color-scheme:dark){

  :root{

    --bg:#0a0a0a;
    --surface:#141414;
    --border:#242424;

    --text:#f5f5f5;
    --text2:#aaaaaa;
    --text3:#666666;

    --tag-bg:#1f1f1f;

  }

}

body{

  background:var(--bg);

  color:var(--text);

  font-family:'Inter',sans-serif;

  min-height:100vh;

}

/* HEADER */

.header{

  position:sticky;
  top:0;
  z-index:999;

  background:rgba(255,255,255,.9);

  backdrop-filter:blur(16px);

  border-bottom:
  1px solid var(--border);

  display:flex;
  align-items:center;
  gap:10px;

  padding:12px;

}

@media(prefers-color-scheme:dark){

  .header{

    background:rgba(20,20,20,.9);

  }

}

.logo{

  font-size:18px;
  font-weight:700;

  flex-shrink:0;

}

.logo span{

  color:var(--accent);

}

.search-wrap{

  flex:1;
  position:relative;

}

.search-wrap svg{

  position:absolute;

  left:10px;
  top:50%;

  transform:translateY(-50%);

  width:15px;
  height:15px;

  stroke:var(--text3);

  fill:none;

  stroke-width:2;

}

.search{

  width:100%;

  padding:9px 12px 9px 34px;

  border:none;

  border-radius:999px;

  background:var(--tag-bg);

  color:var(--text);

  outline:none;

  font-size:13px;

}

/* LANGUAGE */

.lang-select{

  border:none;

  background:var(--tag-bg);

  color:var(--text);

  border-radius:999px;

  padding:9px 12px;

  font-size:12px;

  cursor:pointer;

}

/* SECTIONS */

.sections{

  position:sticky;

  top:64px;

  z-index:998;

  display:flex;

  gap:8px;

  overflow-x:auto;

  padding:12px;

  background:var(--bg);

}

.sections::-webkit-scrollbar{

  display:none;

}

.section-btn{

  border:none;

  background:var(--tag-bg);

  color:var(--text);

  padding:10px 14px;

  border-radius:999px;

  font-size:13px;

  cursor:pointer;

  white-space:nowrap;

  flex-shrink:0;

}

.section-btn.active{

  background:var(--accent);

  color:white;

}

/* FEED */

.feed{

  max-width:680px;

  margin:auto;

  padding:10px 12px 60px;

  display:flex;

  flex-direction:column;

  gap:16px;

}

/* CARD */

.post-card{

  background:var(--surface);

  border:
  1px solid var(--border);

  border-radius:22px;

  overflow:hidden;

  box-shadow:
  0 4px 16px rgba(0,0,0,.06);

}

.post-head{

  display:flex;

  align-items:center;

  gap:12px;

  padding:14px;

}

.avatar{

  width:44px;
  height:44px;

  border-radius:50%;

  display:flex;

  align-items:center;
  justify-content:center;

  color:white;

  font-size:14px;
  font-weight:700;

  flex-shrink:0;

  background:
  linear-gradient(
    135deg,
    #0095f6,
    #7c3aed
  );

}

.post-meta{

  flex:1;
  min-width:0;

}

.post-channel{

  color:var(--text);

  text-decoration:none;

  font-size:14px;

  font-weight:700;

  display:block;

  white-space:nowrap;

  overflow:hidden;

  text-overflow:ellipsis;

}

.post-date{

  font-size:11px;

  color:var(--text3);

  margin-top:3px;

}

.open-btn{

  border:none;

  background:var(--accent);

  color:white;

  border-radius:999px;

  padding:8px 14px;

  font-size:12px;

  font-weight:700;

  text-decoration:none;

  flex-shrink:0;

}

.post-img{

  width:100%;

  max-height:420px;

  object-fit:cover;

  display:block;

  background:var(--tag-bg);

}

.post-text{

  padding:14px;

  font-size:14px;

  line-height:1.7;

  word-break:break-word;

}

.post-text a{

  color:var(--accent);

  text-decoration:none;

}

/* TAGS */

.hash-tags{

  display:flex;

  flex-wrap:wrap;

  gap:8px;

  padding:0 14px 14px;

}

.hash-tag{

  background:var(--tag-bg);

  color:var(--text2);

  font-size:11px;

  padding:6px 10px;

  border-radius:999px;

}

/* FOOT */

.post-foot{

  display:flex;

  align-items:center;

  gap:14px;

  padding:12px 14px;

  border-top:
  1px solid var(--border);

}

.stat{

  font-size:12px;

  color:var(--text3);

}

.copy-btn{

  margin-left:auto;

  border:none;

  background:var(--tag-bg);

  color:var(--text);

  border-radius:999px;

  padding:8px 14px;

  cursor:pointer;

  font-size:12px;

  font-weight:600;

}

/* LOADER */

.loader{

  text-align:center;

  padding:30px;

  color:var(--text3);

  font-size:13px;

}

/* TOAST */

.toast{

  position:fixed;

  bottom:20px;

  left:50%;

  transform:translateX(-50%);

  background:#111;

  color:white;

  padding:10px 16px;

  border-radius:999px;

  font-size:13px;

  z-index:99999;

}

</style>
</head>

<body>

<header class="header">

  <div class="logo">

    TELE<span>POSTS</span>

  </div>

  <div class="search-wrap">

    <svg viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/>
      <path d="m21 21-4.35-4.35"/>
    </svg>

    <input
    id="search"
    class="search"
    type="text"
    placeholder="Search..."
    />

  </div>

  <select
  id="langSelect"
  class="lang-select"
  >

    <option value="all">🌍</option>
    <option value="arabic" selected>🇸🇦</option>
    <option value="english">🇺🇸</option>
    <option value="russian">🇷🇺</option>
    <option value="turkish">🇹🇷</option>
    <option value="persian">🇮🇷</option>
    <option value="other">🔡</option>

  </select>

</header>

<div class="sections">

  <button
  class="section-btn active"
  data-section="trending"
  >
    🔥 Trending
  </button>

  <button
  class="section-btn"
  data-section="latest"
  >
    🕒 Latest
  </button>

  <button
  class="section-btn"
  data-section="growing"
  >
    🚀 Growing
  </button>

  <button
  class="section-btn"
  data-section="biggest"
  >
    👑 Biggest
  </button>

  <button
  class="section-btn"
  data-section="gems"
  >
    💎 Gems
  </button>

</div>

<div
id="feed"
class="feed"
></div>

<div
id="loader"
class="loader"
>
Loading...
</div>

<script>

const WORKER =
'https://telegram-proxy.mohamed-ahmed408408.workers.dev/?channel=';

const BATCH = 12;

const CACHE = new Map();

const NSFW_WORDS = [

  'porn',
  'xxx',
  'sex',
  'nude',
  'onlyfans',
  'nsfw',

  'سكس',
  'نيك',
  'اباحي',

  'pornhub',
  'xvideos',
  'xnxx'

];

let allChannels = [];

let filtered = [];

let page = 0;

let isLoading = false;

let searchQ = '';

let activeLang = 'arabic';

let activeSection = 'trending';

/* LANGUAGE */

function detectLang(text){

  if(!text) return 'other';

  const plain =
  text.replace(/<[^>]*>/g,'');

  if(/[\u0600-\u06FF]/.test(plain)){

    if(/[پگچژکی]/.test(plain)){
      return 'persian';
    }

    return 'arabic';

  }

  if(/[А-Яа-яЁё]/.test(plain)){
    return 'russian';
  }

  if(/[şğıüçöİĞŞ]/i.test(plain)){
    return 'turkish';
  }

  if(/[a-z]/i.test(plain)){
    return 'english';
  }

  return 'other';

}

/* DATE */

function formatDate(date){

  if(!date) return '';

  const d =
  new Date(date);

  const diff =
  (Date.now() - d.getTime()) / 1000;

  if(diff < 60){
    return 'Just now';
  }

  if(diff < 3600){
    return Math.floor(diff/60)+'m ago';
  }

  if(diff < 86400){
    return Math.floor(diff/3600)+'h ago';
  }

  if(diff < 604800){
    return Math.floor(diff/86400)+'d ago';
  }

  return d.toLocaleDateString();

}

/* TAGS */

function extractTags(text){

  if(!text) return [];

  const clean =
  text
  .replace(/<[^>]*>/g,'')
  .toLowerCase();

  const map = {

    Tech:[
      'ai',
      'python',
      'android',
      'coding'
    ],

    Crypto:[
      'btc',
      'bitcoin',
      'crypto'
    ],

    Games:[
      'pubg',
      'gaming',
      'ps5'
    ],

    Movies:[
      'movie',
      'film',
      'netflix'
    ],

    Sports:[
      'football',
      'soccer',
      'fifa'
    ],

    News:[
      'news',
      'breaking'
    ]

  };

  const found = [];

  Object.entries(map)
  .forEach(([tag,words])=>{

    if(
      words.some(
        w=>clean.includes(w)
      )
    ){
      found.push(tag);
    }

  });

  return found.slice(0,3);

}

/* COPY */

function copyPostLink(
  username,
  postId
){

  const url =
  `https://t.me/${username}/${postId}`;

  navigator
  .clipboard
  .writeText(url);

  showToast(
    'Post copied'
  );

}

/* TOAST */

function showToast(text){

  const div =
  document.createElement('div');

  div.className =
  'toast';

  div.innerText =
  text;

  document.body.appendChild(div);

  setTimeout(()=>{

    div.remove();

  },2000);

}

/* SEARCH */

function matchSearch(ch,q){

  if(!q) return true;

  q = q.toLowerCase();

  return (

    (ch.title || '')
    .toLowerCase()
    .includes(q)

    ||

    (ch.username || '')
    .toLowerCase()
    .includes(q)

  );

}

/* FILTER + SORT */

function buildFeed(){

  let list =
  allChannels.filter(ch=>

    ch.username

    &&

    matchSearch(
      ch,
      searchQ
    )

  );

  if(activeSection === 'latest'){

    list.sort(

      (a,b)=>

      (b.last_post_timestamp || 0)

      -

      (a.last_post_timestamp || 0)

    );

  }

  if(activeSection === 'biggest'){

    list.sort(

      (a,b)=>

      (b.subscribers || 0)

      -

      (a.subscribers || 0)

    );

  }

  if(activeSection === 'growing'){

    list.sort((a,b)=>{

      const aScore =

        (a.last_post_views || 0)

        /

        Math.max(
          a.subscribers || 1,
          1
        );

      const bScore =

        (b.last_post_views || 0)

        /

        Math.max(
          b.subscribers || 1,
          1
        );

      return bScore - aScore;

    });

  }

  if(activeSection === 'gems'){

    list =
    list.filter(ch=>

      (ch.subscribers || 0)
      < 50000

    );

    list.sort((a,b)=>{

      const aScore =

        (a.last_post_views || 0)

        /

        Math.max(
          a.subscribers || 1,
          1
        );

      const bScore =

        (b.last_post_views || 0)

        /

        Math.max(
          b.subscribers || 1,
          1
        );

      return bScore - aScore;

    });

  }

  if(activeSection === 'trending'){

    list.sort((a,b)=>{

      const aScore =

        ((a.last_post_views || 0) * 3)

        +

        ((a.subscribers || 0) * 0.1)

        +

        Math.random()*5000;

      const bScore =

        ((b.last_post_views || 0) * 3)

        +

        ((b.subscribers || 0) * 0.1)

        +

        Math.random()*5000;

      return bScore - aScore;

    });

  }

  filtered = list;

}

/* PARSE */

function parseLastPost(html){

  const doc =
  new DOMParser()
  .parseFromString(
    html,
    'text/html'
  );

  const posts =
  doc.querySelectorAll(
    '.tgme_widget_message_wrap'
  );

  if(!posts.length){
    return null;
  }

  const last =
  posts[posts.length - 1];

  let text = '';

  const textEl =
  last.querySelector(
    '.tgme_widget_message_text'
  );

  if(textEl){

    text =
    textEl.innerHTML.trim();

  }

  let img = null;

  const imgEl =
  last.querySelector(
    '.tgme_widget_message_photo_wrap'
  );

  if(imgEl){

    const style =
    imgEl.getAttribute(
      'style'
    ) || '';

    const match =
    style.match(
      /url\(['"]?([^'")]+)['"]?\)/
    );

    if(match){

      img = match[1];

    }

  }

  let date = '';

  const dateEl =
  last.querySelector(
    '.tgme_widget_message_date time'
  );

  if(dateEl){

    date =
    dateEl.getAttribute(
      'datetime'
    ) || '';

  }

  let views = '';

  const viewEl =
  last.querySelector(
    '.tgme_widget_message_views'
  );

  if(viewEl){

    views =
    viewEl.textContent.trim();

  }

  return {

    text,
    img,
    date,
    views

  };

}

/* FETCH */

async function fetchOne(channel){

  if(CACHE.has(channel.username)){

    return CACHE.get(
      channel.username
    );

  }

  try{

    const res =
    await fetch(

      WORKER +
      channel.username,

      {
        signal:
        AbortSignal.timeout(5000)
      }

    );

    const html =
    await res.text();

    const post =
    parseLastPost(html);

    if(
      !post
      ||
      (
        !post.text
        &&
        !post.img
      )
    ){
      return null;
    }

    const lower = (

      (
        post.text || ''
      )

      +

      ' '

      +

      (
        channel.title || ''
      )

    ).toLowerCase();

    const blocked =
    NSFW_WORDS.some(
      word=>
      lower.includes(word)
    );

    if(blocked){
      return null;
    }

    const lang =
    detectLang(
      post.text || ''
    );

    if(

      activeLang !== 'all'

      &&

      lang !== activeLang

    ){
      return null;
    }

    const result = {

      channel,
      post

    };

    CACHE.set(
      channel.username,
      result
    );

    return result;

  }catch(e){

    return null;

  }

}

/* CARD */

function makeCard(channel,post){

  const tags =
  extractTags(
    post.text
  );

  const div =
  document.createElement('div');

  div.className =
  'post-card';

  div.innerHTML = `

    <div class="post-head">

      <div class="avatar">

        ${(channel.title || channel.username)
        .slice(0,2)
        .toUpperCase()}

      </div>

      <div class="post-meta">

        <a
        class="post-channel"
        href="https://t.me/${channel.username}"
        target="_blank"
        >

          ${channel.title || channel.username}

        </a>

        <div class="post-date">

          ${formatDate(post.date)}

        </div>

      </div>

      <a
      class="open-btn"
      href="https://t.me/${channel.username}"
      target="_blank"
      >

        Open

      </a>

    </div>

    ${
      post.img

      ?

      `<img
      class="post-img"
      src="${post.img}"
      loading="lazy"
      >`

      :

      ''

    }

    ${
      post.text

      ?

      `<div class="post-text">

        ${post.text}

      </div>`

      :

      ''

    }

    ${
      tags.length

      ?

      `<div class="hash-tags">

      ${
        tags.map(tag=>`

          <div class="hash-tag">
            #${tag}
          </div>

        `).join('')
      }

      </div>`

      :

      ''

    }

    <div class="post-foot">

      <div class="stat">

        👁️ ${post.views || 0}

      </div>

      <div class="stat">

        👥 ${channel.subscribers || 0}

      </div>

      <button
      class="copy-btn"
      onclick="copyPostLink('${channel.username}','${channel.last_post_id}')"
      >

        🔗 Copy

      </button>

    </div>

  `;

  return div;

}

/* LOAD */

async function loadMore(){

  if(isLoading){
    return;
  }

  isLoading = true;

  const start =
  page * BATCH;

  const end =
  start + BATCH;

  const slice =
  filtered.slice(start,end);

  page++;

  const results =
  await Promise.allSettled(

    slice.map(
      ch=>fetchOne(ch)
    )

  );

  results.forEach(r=>{

    if(

      r.status === 'fulfilled'

      &&

      r.value

    ){

      document
      .getElementById('feed')
      .appendChild(

        makeCard(
          r.value.channel,
          r.value.post
        )

      );

    }

  });

  isLoading = false;

}

/* INIT */

function refreshFeed(){

  page = 0;

  document
  .getElementById('feed')
  .innerHTML = '';

  buildFeed();

  loadMore();

}

/* EVENTS */

document
.getElementById('search')
.addEventListener('input',e=>{

  searchQ =
  e.target.value
  .toLowerCase()
  .trim();

  refreshFeed();

});

document
.getElementById('langSelect')
.addEventListener('change',e=>{

  activeLang =
  e.target.value;

  refreshFeed();

});

document
.querySelectorAll('.section-btn')
.forEach(btn=>{

  btn.addEventListener('click',()=>{

    document
    .querySelectorAll('.section-btn')
    .forEach(b=>
      b.classList.remove('active')
    );

    btn.classList.add('active');

    activeSection =
    btn.dataset.section;

    refreshFeed();

  });

});

/* SCROLL */

window.addEventListener('scroll',()=>{

  if(

    window.innerHeight
    +
    window.scrollY

    >=

    document.body.offsetHeight
    - 1500

  ){

    loadMore();

  }

});

/* BOOT */

async function boot(){

  try{

    const r =
    await fetch(
      './channels_data.json'
    );

    allChannels =
    await r.json();

    allChannels =
    allChannels.filter(
      c=>c.username
    );

  }catch(e){

    allChannels = [];

  }

  refreshFeed();

}

boot();

</script>

</body>
</html>
