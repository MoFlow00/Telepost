<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TELEPOSTS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f7fb;--surface:#fff;--border:#e5e9f0;
  --text:#111;--text2:#555;--text3:#9ca3af;
  --accent:#0095f6;--tag-bg:#eef2f7;--success:#22c55e;--error:#ef4444;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0a0a0a;--surface:#141414;--border:#242424;
    --text:#f0f0f0;--text2:#aaa;--text3:#666;--tag-bg:#1e1e1e;
  }
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{
  position:sticky;top:0;z-index:999;
  background:rgba(255,255,255,.9);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);padding:12px;
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
}
@media(prefers-color-scheme:dark){.header{background:rgba(20,20,20,.9)}}
.logo{font-size:18px;font-weight:700;flex-shrink:0;cursor:pointer}
.logo span{color:var(--accent)}
.search{
  flex:1;min-width:120px;padding:10px 14px;border:none;
  border-radius:18px;background:var(--tag-bg);color:var(--text);outline:none;
  transition:box-shadow .2s;
}
.search:focus{box-shadow:0 0 0 3px rgba(0,149,246,.2)}
.select{
  padding:10px 12px;border:none;border-radius:18px;
  background:var(--tag-bg);color:var(--text);outline:none;cursor:pointer;
}
.feed{
  max-width:680px;margin:auto;padding:16px 12px 70px;
  display:flex;flex-direction:column;gap:18px;
}
.post-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:22px;overflow:hidden;
  box-shadow:0 4px 18px rgba(0,0,0,.07);
  transition:transform .2s,box-shadow .2s;
  animation:fadeIn .3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.post-card:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.12)}
.post-head{display:flex;align-items:center;gap:12px;padding:14px}
.avatar{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#0095f6,#7c3aed);
  color:white;display:flex;align-items:center;
  justify-content:center;font-weight:700;flex-shrink:0;font-size:14px;
}
.post-meta{flex:1;min-width:0}
.post-channel{
  font-size:14px;font-weight:700;color:var(--text);
  text-decoration:none;display:block;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:200px;
}
.post-date{margin-top:2px;font-size:11px;color:var(--text3)}
.open-btn{
  padding:8px 14px;border-radius:20px;background:var(--accent);
  color:white;text-decoration:none;font-size:12px;font-weight:700;flex-shrink:0;
  transition:opacity .2s;
}
.open-btn:hover{opacity:.9}
.post-img{width:100%;max-height:500px;object-fit:cover;display:block;background:#0001}
.post-text{padding:14px;font-size:14px;line-height:1.7;word-break:break-word;color:var(--text2)}
.post-text a{color:var(--accent);text-decoration:none}
.post-foot{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-top:1px solid var(--border);
}
.stat{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:4px}
.trending-badge{
  background:linear-gradient(135deg,#ff6b6b,#ee5a24);
  color:white;padding:2px 8px;border-radius:10px;
  font-size:10px;font-weight:700;margin-left:6px;animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.copy-btn{
  margin-left:auto;border:none;background:var(--tag-bg);
  color:var(--text);padding:7px 12px;border-radius:18px;
  cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;
}
.copy-btn:hover{background:var(--accent);color:white}
.copy-btn.copied{background:var(--success);color:white}
.spinner-wrap{padding:20px;text-align:center;display:none}
.spinner-wrap.active{display:block}
.spinner{
  width:28px;height:28px;border-radius:50%;
  border:3px solid var(--tag-bg);border-top-color:var(--accent);
  animation:spin .7s linear infinite;margin:auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{
  text-align:center;padding:40px 20px;color:var(--text3);
}
.status-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  padding:8px 16px;font-size:11px;color:var(--text3);
  display:flex;justify-content:space-between;align-items:center;
  z-index:1000;
}
@media(max-width:768px){
  .header{flex-wrap:wrap}
  .search{width:100%;order:3}
  .select{flex:1;min-width:100px}
  .post-channel{max-width:150px}
}
</style>
</head>
<body>

<header class="header">
  <div class="logo" id="logo">TELE<span>POSTS</span></div>
  <input id="search" class="search" placeholder="🔍 Search channels...">
  <select id="sortSelect" class="select">
    <option value="trending">🔥 Trending</option>
    <option value="newest">🕒 Newest</option>
    <option value="biggest">👑 Biggest</option>
    <option value="fastgrowing">🚀 Fast Growing</option>
    <option value="hiddengems">💎 Hidden Gems</option>
    <option value="az">🔤 A-Z</option>
  </select>
  <select id="langSelect" class="select">
    <option value="arabic">🇸🇦 AR</option>
    <option value="english">🇺🇸 EN</option>
    <option value="russian">🇷🇺 RU</option>
    <option value="turkish">🇹🇷 TR</option>
    <option value="persian">🇮🇷 FA</option>
    <option value="other">🔡 Other</option>
    <option value="all">🌍 All</option>
  </select>
</header>

<div id="feed" class="feed"></div>
<div class="spinner-wrap" id="spinnerWrap"><div class="spinner"></div></div>
<div id="emptyState" class="empty-state" style="display:none">No posts found 😕<br><small style="color:var(--text3)">Try changing filters or search</small></div>

<div class="status-bar" id="statusBar" style="display:none">
  <span id="statusText">Ready</span>
  <span id="cacheStats">Cache: 0</span>
</div>


<script>
const CONFIG = {
  WORKER_URL: 'https://telegram-proxy.mohamed-ahmed408408.workers.dev/?channel=',

  BATCH_SIZE: 12,
  CONCURRENT_REQUESTS: 6,
  FETCH_TIMEOUT: 4000,

  TRENDING_DAYS: 14,

  NSFW_WORDS: [
    'porn','xxx','sex','nude','onlyfans','hentai',
    'سكس','نيك','اباحي','شرموطة','عري'
  ]
};

const cache = new Map();

const state = {
  allChannels: [],
  filteredPool: [],
  currentIndex: 0,
  isLoading: false,
  hasMore: true,

  filters: {
    sort: 'trending',
    lang: 'arabic',
    search: ''
  }
};

const refreshSeed = Math.floor(Date.now() / 30000);

function shuffleSeeded(array){

  const arr = [...array];

  let seed = refreshSeed;

  function random(){

    seed = (seed * 9301 + 49297) % 233280;

    return seed / 233280;

  }

  for(let i = arr.length - 1; i > 0; i--){

    const j = Math.floor(random() * (i + 1));

    [arr[i], arr[j]] = [arr[j], arr[i]];

  }

  return arr;

}

function parseViews(value){

  if(!value) return 0;

  const str = String(value)
  .replace(/,/g,'')
  .trim();

  if(/K$/i.test(str)){
    return Math.round(parseFloat(str) * 1000);
  }

  if(/M$/i.test(str)){
    return Math.round(parseFloat(str) * 1000000);
  }

  return parseInt(
    str.replace(/[^\d]/g,'')
  ) || 0;

}

function formatDate(dateString){

  if(!dateString) return '';

  try{

    const date = new Date(dateString);

    const now = new Date();

    const diff = (now - date) / 1000;

    if(diff < 60){
      return 'Just now';
    }

    if(diff < 3600){
      return Math.floor(diff / 60) + 'm ago';
    }

    if(diff < 86400){
      return Math.floor(diff / 3600) + 'h ago';
    }

    if(diff < 604800){
      return Math.floor(diff / 86400) + 'd ago';
    }

    return date.toLocaleDateString();

  }catch(e){

    return '';

  }

}

function parseLastPost(html){

  const doc = new DOMParser()
  .parseFromString(html,'text/html');

  const posts = doc.querySelectorAll(
    '.tgme_widget_message_wrap'
  );

  if(!posts.length){
    return null;
  }

  const last = posts[posts.length - 1];

  let text = '';

  const textEl = last.querySelector(
    '.tgme_widget_message_text'
  );

  if(textEl){
    text = textEl.innerHTML.trim();
  }

  let image = null;

  const imageEl = last.querySelector(
    '.tgme_widget_message_photo_wrap'
  );

  if(imageEl){

    const style = imageEl.getAttribute('style') || '';

    const match = style.match(
      /url\(['"]?([^'")]+)['"]?\)/
    );

    if(match){
      image = match[1];
    }

  }

  const dateEl = last.querySelector(
    '.tgme_widget_message_date time'
  );

  const viewEl = last.querySelector(
    '.tgme_widget_message_views'
  );

  const postEl = last.querySelector(
    '[data-post]'
  );

  return {

    text,

    image,

    date:
    dateEl?.getAttribute('datetime') || '',

    views:
    viewEl?.textContent.trim() || '',

    postId:
    postEl?.getAttribute('data-post') || ''

  };

}

function isSafe(channel, post){

  const content = (

    (post.text || '')

    +

    ' '

    +

    (channel.title || '')

  ).toLowerCase();

  return !CONFIG.NSFW_WORDS.some(
    word => content.includes(word)
  );

}

function calculateTrendingScore(channel){

  const views = Number(
    channel.last_post_views || 0
  );

  const subscribers = Number(
    channel.subscribers || 1
  );

  const timestamp = Number(
    channel.last_post_timestamp || 0
  );

  if(!timestamp){
    return 0;
  }

  const ageHours = (
    (Date.now() / 1000)
    -
    timestamp
  ) / 3600;

  const maxHours =
  CONFIG.TRENDING_DAYS * 24;

  if(ageHours > maxHours){
    return 0;
  }

  const freshness =
  1 - (ageHours / maxHours);

  const engagement =
  views / Math.max(subscribers,1);

  const score =

    (Math.log10(views + 1) * 0.45)

    +

    (engagement * 8)

    +

    (freshness * 4);

  return score;

}

function buildPool(){

  const q = state.filters.search
  .toLowerCase()
  .trim();

  let list = state.allChannels.filter(ch => {

    if(!ch.username){
      return false;
    }

    const lang =
    (ch.language || 'other')
    .toLowerCase();

    if(
      state.filters.lang !== 'all'
      &&
      lang !== state.filters.lang
    ){
      return false;
    }

    if(!q){
      return true;
    }

    return (

      (ch.title || '')
      .toLowerCase()
      .includes(q)

      ||

      (ch.username || '')
      .toLowerCase()
      .includes(q)

    );

  });

  if(state.filters.sort === 'trending'){

    list = list
    .map(ch => ({
      ...ch,
      score:
      calculateTrendingScore(ch)
    }))
    .filter(ch => ch.score > 0)
    .sort((a,b)=>b.score-a.score);

    const top = list.slice(0,120);

    const rest = list.slice(120);

    list = [
      ...shuffleSeeded(top),
      ...shuffleSeeded(rest)
    ];

  }

  else if(state.filters.sort === 'newest'){

    list.sort(
      (a,b)=>(
        b.last_post_timestamp || 0
      ) - (
        a.last_post_timestamp || 0
      )
    );

    list = shuffleSeeded(list);

  }

  else if(state.filters.sort === 'biggest'){

    list.sort(
      (a,b)=>(
        b.subscribers || 0
      ) - (
        a.subscribers || 0
      )
    );

  }

  else if(state.filters.sort === 'fastgrowing'){

    list.sort((a,b)=>{

      const aRate =
      (a.last_post_views || 0)
      /
      Math.max(a.subscribers || 1,1);

      const bRate =
      (b.last_post_views || 0)
      /
      Math.max(b.subscribers || 1,1);

      return bRate - aRate;

    });

  }

  else if(state.filters.sort === 'hiddengems'){

    list.sort((a,b)=>{

      const aScore =
      (a.subscribers || 1) < 50000
      ?
      (a.last_post_views || 0)
      /
      Math.log10((a.subscribers || 1)+10)
      :
      0;

      const bScore =
      (b.subscribers || 1) < 50000
      ?
      (b.last_post_views || 0)
      /
      Math.log10((b.subscribers || 1)+10)
      :
      0;

      return bScore - aScore;

    });

  }

  else if(state.filters.sort === 'az'){

    list.sort((a,b)=>
      (a.title || a.username)
      .localeCompare(
        b.title || b.username
      )
    );

  }

  state.filteredPool = list;

}

async function fetchChannel(channel){

  if(cache.has(channel.username)){
    return cache.get(channel.username);
  }

  try{

    const response = await fetch(

      CONFIG.WORKER_URL + channel.username,

      {
        signal:
        AbortSignal.timeout(
          CONFIG.FETCH_TIMEOUT
        )
      }

    );

    const html = await response.text();

    const post = parseLastPost(html);

    if(!post){
      return null;
    }

    if(
      !post.text
      &&
      !post.image
    ){
      return null;
    }

    if(!isSafe(channel,post)){
      return null;
    }

    const result = {
      channel,
      post
    };

    cache.set(
      channel.username,
      result
    );

    return result;

  }catch(e){

    return null;

  }

}

function createCard(channel,post,index){

  const postUrl = post.postId
  ?
  'https://t.me/' + post.postId
  :
  'https://t.me/' + channel.username;

  const card = document.createElement('div');

  card.className = 'post-card';

  const trendingBadge =
  state.filters.sort === 'trending'
  &&
  index < 10
  ?
  `<span class="trending-badge">#${index+1}</span>`
  :
  '';

  card.innerHTML = `

    <div class="post-head">

      <div class="avatar">
        ${(channel.title || channel.username)
        .slice(0,2)
        .toUpperCase()}
      </div>

      <div class="post-meta">

        <a
        class="post-channel"
        href="https://t.me/${channel.username}"
        target="_blank"
        >

        ${channel.title || channel.username}

        ${trendingBadge}

        </a>

        <div class="post-date">
          ${formatDate(post.date)}
        </div>

      </div>

      <a
      class="open-btn"
      href="${postUrl}"
      target="_blank"
      >
      Open
      </a>

    </div>

    ${
      post.image
      ?
      `<img
      class="post-img"
      src="${post.image}"
      loading="lazy"
      >`
      :
      ''
    }

    ${
      post.text
      ?
      `<div class="post-text">
      ${post.text}
      </div>`
      :
      ''
    }

    <div class="post-foot">

      <div class="stat">
        👁️ ${post.views || 0}
      </div>

      <button
      class="copy-btn"
      data-url="${postUrl}"
      >
      Copy
      </button>

    </div>

  `;

  const copyBtn = card.querySelector(
    '.copy-btn'
  );

  copyBtn.addEventListener('click',()=>{

    navigator.clipboard.writeText(
      copyBtn.dataset.url
    );

    copyBtn.innerText = 'Copied';

    copyBtn.classList.add('copied');

    setTimeout(()=>{

      copyBtn.innerText = 'Copy';

      copyBtn.classList.remove('copied');

    },1200);

  });

  return card;

}

async function loadBatch(){

  if(state.isLoading){
    return;
  }

  if(!state.hasMore){
    return;
  }

  state.isLoading = true;

  document
  .getElementById('spinnerWrap')
  .classList.add('active');

  const start = state.currentIndex;

  const end = Math.min(
    start + CONFIG.BATCH_SIZE,
    state.filteredPool.length
  );

  const batch = state.filteredPool.slice(
    start,
    end
  );

  state.currentIndex = end;

  const results = [];

  for(
    let i = 0;
    i < batch.length;
    i += CONFIG.CONCURRENT_REQUESTS
  ){

    const group = batch.slice(
      i,
      i + CONFIG.CONCURRENT_REQUESTS
    );

    const chunk = await Promise.allSettled(
      group.map(fetchChannel)
    );

    results.push(...chunk);

  }

  const fragment = document
  .createDocumentFragment();

  let visibleIndex = start;

  results.forEach(result=>{

    if(
      result.status === 'fulfilled'
      &&
      result.value
    ){

      fragment.appendChild(

        createCard(
          result.value.channel,
          result.value.post,
          visibleIndex
        )

      );

      visibleIndex++;

    }

  });

  document
  .getElementById('feed')
  .appendChild(fragment);

  if(
    state.currentIndex >=
    state.filteredPool.length
  ){
    state.hasMore = false;
  }

  document
  .getElementById('spinnerWrap')
  .classList.remove('active');

  state.isLoading = false;

}

function applyFilters(){

  buildPool();

  state.currentIndex = 0;

  state.hasMore = true;

  document
  .getElementById('feed')
  .innerHTML = '';

  loadBatch();

}

function debounce(fn,delay){

  let timer;

  return (...args)=>{

    clearTimeout(timer);

    timer = setTimeout(()=>{
      fn(...args);
    },delay);

  };

}

const searchDebounced = debounce(value=>{

  state.filters.search = value;

  applyFilters();

},250);

function setupEvents(){

  document
  .getElementById('search')
  .addEventListener('input',e=>{

    searchDebounced(
      e.target.value
    );

  });

  document
  .getElementById('sortSelect')
  .addEventListener('change',e=>{

    state.filters.sort = e.target.value;

    applyFilters();

  });

  document
  .getElementById('langSelect')
  .addEventListener('change',e=>{

    state.filters.lang = e.target.value;

    applyFilters();

  });

  window.addEventListener('scroll',()=>{

    if(
      window.innerHeight
      +
      window.scrollY
      >=
      document.body.offsetHeight - 1200
    ){
      loadBatch();
    }

  });

}

async function init(){

  try{

    const response = await fetch(
      './channels_data.json'
    );

    state.allChannels = await response.json();

    state.allChannels =
    state.allChannels.filter(
      ch => ch.username
    );

  }catch(e){

    state.allChannels = [];

  }

  document
  .getElementById('langSelect')
  .value = 'arabic';

  document
  .getElementById('sortSelect')
  .value = 'trending';

  setupEvents();

  applyFilters();

}

init();
</script>




  


  

</body>
</html>
