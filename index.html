<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TELEPOSTS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#f5f7fb;
  --surface:#fff;
  --border:#e5e9f0;
  --text:#111;
  --text2:#555;
  --text3:#9ca3af;
  --accent:#0095f6;
  --tag-bg:#eef2f7;
}

@media(prefers-color-scheme:dark){
  :root{
    --bg:#0a0a0a;
    --surface:#141414;
    --border:#242424;
    --text:#f0f0f0;
    --text2:#aaa;
    --text3:#666;
    --tag-bg:#1e1e1e;
  }
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.header{
  position:sticky;
  top:0;
  z-index:999;
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
  padding:12px;
  display:flex;
  gap:10px;
  align-items:center;
}

@media(prefers-color-scheme:dark){
  .header{
    background:rgba(20,20,20,.9);
  }
}

.logo{
  font-size:18px;
  font-weight:700;
  flex-shrink:0;
}

.logo span{
  color:var(--accent);
}

.search{
  flex:1;
  min-width:0;
  padding:10px 14px;
  border:none;
  border-radius:18px;
  background:var(--tag-bg);
  color:var(--text);
  outline:none;
}

.select{
  padding:10px 12px;
  border:none;
  border-radius:18px;
  background:var(--tag-bg);
  color:var(--text);
  outline:none;
}

.feed{
  max-width:680px;
  margin:auto;
  padding:16px 12px 70px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.post-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 4px 18px rgba(0,0,0,.07);
}

.post-head{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px;
}

.avatar{
  width:44px;
  height:44px;
  border-radius:50%;
  background:linear-gradient(135deg,#0095f6,#7c3aed);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  flex-shrink:0;
}

.post-meta{
  flex:1;
  min-width:0;
}

.post-channel{
  font-size:14px;
  font-weight:700;
  color:var(--text);
  text-decoration:none;
  display:block;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.post-date{
  margin-top:2px;
  font-size:11px;
  color:var(--text3);
}

.open-btn{
  padding:8px 14px;
  border-radius:20px;
  background:var(--accent);
  color:white;
  text-decoration:none;
  font-size:12px;
  font-weight:700;
  flex-shrink:0;
}

.post-img{
  width:100%;
  max-height:500px;
  object-fit:cover;
  display:block;
}

.post-text{
  padding:14px;
  font-size:14px;
  line-height:1.7;
  word-break:break-word;
}

.post-text a{
  color:var(--accent);
  text-decoration:none;
}

.post-foot{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  border-top:1px solid var(--border);
}

.stat{
  font-size:12px;
  color:var(--text3);
}

.copy-btn{
  margin-left:auto;
  border:none;
  background:var(--tag-bg);
  color:var(--text);
  padding:7px 12px;
  border-radius:18px;
  cursor:pointer;
  font-size:12px;
  font-weight:600;
}

.spinner-wrap{
  padding:20px;
  text-align:center;
  display:none;
}

.spinner-wrap.active{
  display:block;
}

.spinner{
  width:28px;
  height:28px;
  border-radius:50%;
  border:3px solid var(--tag-bg);
  border-top-color:var(--accent);
  animation:spin .7s linear infinite;
  margin:auto;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

@media(max-width:768px){

  .header{
    flex-wrap:wrap;
  }

  .search{
    width:100%;
  }

  .select{
    flex:1;
  }

}
</style>
</head>
<body>

<header class="header">

  <div class="logo">
    TELE<span>POSTS</span>
  </div>

  <input
  id="search"
  class="search"
  placeholder="Search..."
  >

  <select id="sortSelect" class="select">
    <option value="trending">🔥 Trending</option>
    <option value="newest">🕒 Newest</option>
    <option value="biggest">👑 Biggest</option>
    <option value="fastgrowing">🚀 Fast Growing</option>
    <option value="hiddengems">💎 Hidden Gems</option>
    <option value="az">🔤 A-Z</option>
  </select>

  <select id="langSelect" class="select">
    <option value="arabic">🇸🇦 AR</option>
    <option value="english">🇺🇸 EN</option>
    <option value="russian">🇷🇺 RU</option>
    <option value="turkish">🇹🇷 TR</option>
    <option value="persian">🇮🇷 FA</option>
    <option value="other">🔡 Other</option>
    <option value="all">🌍 All</option>
  </select>

</header>

<div id="feed" class="feed"></div>

<div class="spinner-wrap" id="spinnerWrap">
  <div class="spinner"></div>
</div>

<script>

const WORKER =
'https://telegram-proxy.mohamed-ahmed408408.workers.dev/?channel=';

const BATCH = 8;
const CONCURRENT = 4;

const CACHE = new Map();

const NSFW_WORDS = [
  'porn','xxx','sex','nude','onlyfans','hentai',
  'سكس','نيك','اباحي','شرموطة'
];

let allChannels = [];
let pool = [];
let poolIndex = 0;
let isLoading = false;

let activeSort = 'trending';
let activeLang = 'arabic';
let searchQ = '';

function detectLang(text){

  if(!text) return 'other';

  const plain =
  text.replace(/<[^>]*>/g,'');

  if(/[\u0600-\u06FF]/.test(plain)){

    if(/[پگچژکی]/.test(plain)){
      return 'persian';
    }

    return 'arabic';
  }

  if(/[А-Яа-яЁё]/.test(plain)){
    return 'russian';
  }

  if(/[şğıüçöİĞŞ]/i.test(plain)){
    return 'turkish';
  }

  if(/[a-z]/i.test(plain)){
    return 'english';
  }

  return 'other';
}

function parseViews(v){

  if(!v) return 0;

  const s = String(v).replace(/,/g,'');

  if(/[Kk]$/.test(s)){
    return parseFloat(s) * 1000;
  }

  if(/[Mm]$/.test(s)){
    return parseFloat(s) * 1000000;
  }

  return parseInt(
    s.replace(/[^\d]/g,'')
  ) || 0;
}

function formatDate(d){

  if(!d) return '';

  try{

    const dt = new Date(d);

    const now = new Date();

    const diff =
    (now-dt)/1000;

    if(diff < 60){
      return 'Just now';
    }

    if(diff < 3600){
      return Math.floor(diff/60)+'m ago';
    }

    if(diff < 86400){
      return Math.floor(diff/3600)+'h ago';
    }

    if(diff < 604800){
      return Math.floor(diff/86400)+'d ago';
    }

    return dt.toLocaleDateString();

  }catch(e){

    return '';

  }
}

function parseLastPost(html){

  const doc =
  new DOMParser()
  .parseFromString(
    html,
    'text/html'
  );

  const posts =
  doc.querySelectorAll(
    '.tgme_widget_message_wrap'
  );

  if(!posts.length){
    return null;
  }

  const last =
  posts[posts.length - 1];

  let text = '';

  const textEl =
  last.querySelector(
    '.tgme_widget_message_text'
  );

  if(textEl){
    text = textEl.innerHTML.trim();
  }

  let img = null;

  const imgEl =
  last.querySelector(
    '.tgme_widget_message_photo_wrap'
  );

  if(imgEl){

    const style =
    imgEl.getAttribute('style') || '';

    const match =
    style.match(
      /url\(['"]?([^'")]+)['"]?\)/
    );

    if(match){
      img = match[1];
    }
  }

  let date = '';

  const dateEl =
  last.querySelector(
    '.tgme_widget_message_date time'
  );

  if(dateEl){
    date = dateEl.getAttribute('datetime') || '';
  }

  let views = '';

  const viewEl =
  last.querySelector(
    '.tgme_widget_message_views'
  );

  if(viewEl){
    views = viewEl.textContent.trim();
  }

  let postId = '';

  const postEl =
  last.querySelector('[data-post]');

  if(postEl){
    postId = postEl.getAttribute('data-post') || '';
  }

  return {
    text,
    img,
    date,
    views,
    postId
  };
}

function calculateTrendingScore(channel){

  const views =
  channel.last_post_views || 0;

  const subs =
  channel.subscribers || 1;

  const timestamp =
  channel.last_post_timestamp || 0;

  const ageHours =
  ((Date.now()/1000)-timestamp)/3600;

  const freshness =
  Math.max(
    0.15,
    1 - (ageHours / 48)
  );

  const engagement =
  views / subs;

  return (
    (views * 0.35)
    +
    (engagement * 5000)
    +
    (freshness * 2000)
  );
}

function buildPool(){

  let list =
  allChannels.filter(ch =>

    ch.username

    &&

    (
      !searchQ
      ||
      (ch.title || '')
      .toLowerCase()
      .includes(searchQ)
      ||
      (ch.username || '')
      .toLowerCase()
      .includes(searchQ)
    )

  );

  if(activeSort === 'trending'){

    list.sort((a,b)=>{

      const scoreA =
      calculateTrendingScore(a)
      +
      Math.random() * 300;

      const scoreB =
      calculateTrendingScore(b)
      +
      Math.random() * 300;

      return scoreB - scoreA;

    });
  }

  else if(activeSort === 'newest'){

    list.sort((a,b)=>

      (b.last_post_timestamp || 0)
      -
      (a.last_post_timestamp || 0)

    );
  }

  else if(activeSort === 'biggest'){

    list.sort((a,b)=>

      (b.subscribers || 0)
      -
      (a.subscribers || 0)

    );
  }

  else if(activeSort === 'fastgrowing'){

    list.sort((a,b)=>{

      const scoreA =
      (a.last_post_views || 0)
      /
      Math.max(a.subscribers || 1,1);

      const scoreB =
      (b.last_post_views || 0)
      /
      Math.max(b.subscribers || 1,1);

      return scoreB - scoreA;
    });
  }

  else if(activeSort === 'hiddengems'){

    list.sort((a,b)=>{

      const scoreA =
      (a.subscribers || 1) < 50000
      ?
      (a.last_post_views || 0)
      /
      Math.log((a.subscribers || 1)+2)
      : 0;

      const scoreB =
      (b.subscribers || 1) < 50000
      ?
      (b.last_post_views || 0)
      /
      Math.log((b.subscribers || 1)+2)
      : 0;

      return scoreB - scoreA;

    });
  }

  else if(activeSort === 'az'){

    list.sort((a,b)=>

      (a.title || a.username)
      .localeCompare(
        b.title || b.username
      )

    );
  }

  pool = list;
}

function makeCard(channel,post){

  const postUrl =
  post.postId
  ?
  'https://t.me/'+post.postId
  :
  'https://t.me/'+channel.username;

  const card =
  document.createElement('div');

  card.className = 'post-card';

  card.innerHTML = `

    <div class="post-head">

      <div class="avatar">
        ${(channel.title || channel.username)
        .slice(0,2)
        .toUpperCase()}
      </div>

      <div class="post-meta">

        <a
        class="post-channel"
        href="https://t.me/${channel.username}"
        target="_blank"
        >

        ${channel.title || channel.username}

        </a>

        <div class="post-date">
          ${formatDate(post.date)}
        </div>

      </div>

      <a
      class="open-btn"
      href="${postUrl}"
      target="_blank"
      >
      Open
      </a>

    </div>

    ${
      post.img
      ?
      `<img class="post-img" src="${post.img}" loading="lazy">`
      :
      ''
    }

    ${
      post.text
      ?
      `<div class="post-text">${post.text}</div>`
      :
      ''
    }

    <div class="post-foot">

      <div class="stat">
        👁️ ${post.views || 0}
      </div>

      <button
      class="copy-btn"
      data-url="${postUrl}"
      >
      Copy
      </button>

    </div>

  `;

  const btn =
  card.querySelector('.copy-btn');

  btn.onclick = ()=>{

    navigator.clipboard.writeText(
      btn.dataset.url
    );

    btn.innerText = 'Copied';

    setTimeout(()=>{
      btn.innerText = 'Copy';
    },1200);

  };

  return card;
}

async function fetchOne(channel){

  if(CACHE.has(channel.username)){
    return CACHE.get(channel.username);
  }

  try{

    const res =
    await fetch(

      WORKER + channel.username,

      {
        signal:
        AbortSignal.timeout(4000)
      }

    );

    const html =
    await res.text();

    const post =
    parseLastPost(html);

    if(
      !post
      ||
      (!post.text && !post.img)
    ){
      return null;
    }

    const lower =
    ((post.text || '') + ' ' + (channel.title || ''))
    .toLowerCase();

    if(
      NSFW_WORDS.some(
        w => lower.includes(w)
      )
    ){
      return null;
    }

    const lang =
    detectLang(post.text || '');

    if(
      activeLang !== 'all'
      &&
      lang !== activeLang
    ){
      return null;
    }

    channel.last_post_views =
    parseViews(post.views);

    const result = {
      channel,
      post
    };

    CACHE.set(
      channel.username,
      result
    );

    return result;

  }catch(e){

    return null;

  }
}

async function loadBatch(){

  if(
    isLoading
    ||
    poolIndex >= pool.length
  ){
    return;
  }

  isLoading = true;

  document
  .getElementById('spinnerWrap')
  .classList.add('active');

  const slice =
  pool.slice(
    poolIndex,
    poolIndex + BATCH
  );

  poolIndex += BATCH;

  const fragment =
  document.createDocumentFragment();

  for(
    let i = 0;
    i < slice.length;
    i += CONCURRENT
  ){

    const group =
    slice.slice(i,i+CONCURRENT);

    const results =
    await Promise.allSettled(
      group.map(ch=>fetchOne(ch))
    );

    results.forEach(r=>{

      if(
        r.status === 'fulfilled'
        &&
        r.value
      ){

        fragment.appendChild(
          makeCard(
            r.value.channel,
            r.value.post
          )
        );
      }

    });
  }

  document
  .getElementById('feed')
  .appendChild(fragment);

  document
  .getElementById('spinnerWrap')
  .classList.remove('active');

  isLoading = false;
}

function initFeed(){

  poolIndex = 0;

  document
  .getElementById('feed')
  .innerHTML = '';

  loadBatch();
}

function applyFilters(){
  buildPool();
  initFeed();
}

document
.getElementById('search')
.addEventListener('input',e=>{

  searchQ =
  e.target.value
  .toLowerCase()
  .trim();

  applyFilters();

});

document
.getElementById('sortSelect')
.addEventListener('change',e=>{

  activeSort = e.target.value;

  applyFilters();

});

document
.getElementById('langSelect')
.addEventListener('change',e=>{

  activeLang = e.target.value;

  CACHE.clear();

  applyFilters();

});

window.addEventListener('scroll',()=>{

  if(
    window.innerHeight
    +
    window.scrollY
    >=
    document.body.offsetHeight - 1400
  ){
    loadBatch();
  }

});

async function boot(){

  try{

    const r =
    await fetch('./channels_data.json');

    allChannels =
    await r.json();

    allChannels =
    allChannels.filter(c=>c.username);

  }catch(e){

    allChannels = [];

  }

  buildPool();

  initFeed();
}

boot();

</script>

</body>
</html>
