<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>TELEPOSTS</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet"
>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{

  --bg:#f5f7fb;
  --surface:#ffffff;
  --border:#dfe4ea;

  --text:#111827;
  --text2:#6b7280;
  --text3:#9ca3af;

  --accent:#0095f6;

}

body{

  font-family:'Inter',sans-serif;

  background:var(--bg);

  color:var(--text);

}

/* HEADER */

.header{

  position:sticky;
  top:0;
  z-index:999;

  background:rgba(255,255,255,.9);

  backdrop-filter:blur(14px);

  border-bottom:
  1px solid var(--border);

  display:flex;
  align-items:center;
  gap:10px;

  padding:14px;

  flex-wrap:wrap;

}

.logo{

  font-size:22px;
  font-weight:700;

}

.logo span{

  color:var(--accent);

}

.search{

  flex:1;
  min-width:180px;

  padding:11px 14px;

  border:none;

  border-radius:14px;

  background:#eef2f7;

  outline:none;

  font-size:14px;

}

.select{

  padding:11px 14px;

  border:none;

  border-radius:14px;

  background:#eef2f7;

  outline:none;

  font-size:14px;

  cursor:pointer;

}

/* FEED */

.feed{

  max-width:700px;

  margin:auto;

  padding:20px 14px 60px;

}

/* CARD */

.post-card{

  background:var(--surface);

  border:
  1px solid var(--border);

  border-radius:22px;

  overflow:hidden;

  margin-bottom:24px;

  box-shadow:
  0 4px 20px rgba(0,0,0,.04);

}

/* HEAD */

.post-head{

  display:flex;
  align-items:center;
  gap:12px;

  padding:16px;

}

.avatar{

  width:46px;
  height:46px;

  border-radius:50%;

  background:linear-gradient(
    135deg,
    #0095f6,
    #7c3aed
  );

  display:flex;
  align-items:center;
  justify-content:center;

  color:white;

  font-size:15px;
  font-weight:700;

  flex-shrink:0;

}

.post-meta{

  flex:1;
  min-width:0;

}

.post-channel{

  font-size:15px;
  font-weight:700;

  color:var(--text);

  text-decoration:none;

  display:block;

  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;

}

.post-date{

  font-size:12px;

  color:var(--text3);

  margin-top:3px;

}

.open-btn{

  padding:9px 15px;

  border-radius:30px;

  background:var(--accent);

  color:white;

  text-decoration:none;

  font-size:12px;
  font-weight:700;

  flex-shrink:0;

}

/* IMAGE */

.post-img{

  width:100%;

  max-height:500px;

  object-fit:cover;

  display:block;

  background:#eee;

}

/* TEXT */

.post-text{

  padding:16px;

  font-size:15px;

  line-height:1.75;

  word-break:break-word;

}

.post-text a{

  color:var(--accent);

  text-decoration:none;

}

/* FOOT */

.post-foot{

  padding:0 16px 16px;

  display:flex;
  align-items:center;
  justify-content:space-between;

}

.views{

  font-size:13px;

  color:var(--text2);

}

/* BUTTON */

.load-wrap{

  padding:30px 0;

  text-align:center;

}

.load-btn{

  padding:14px 30px;

  border:none;

  border-radius:40px;

  background:var(--accent);

  color:white;

  font-size:14px;
  font-weight:700;

  cursor:pointer;

}

.load-btn:disabled{

  opacity:.5;

}

/* MOBILE */

@media(max-width:768px){

  .header{

    gap:8px;

  }

  .search{

    width:100%;

  }

  .select{

    flex:1;

  }

}

</style>

</head>

<body>

<header class="header">

<div class="logo">

  TELE<span>POSTS</span>

</div>

<input
type="text"
id="search"
class="search"
placeholder="Search channels..."
>

<select
id="sortSelect"
class="select"
>

  <option value="newest" selected>
    🕒 Newest
  </option>

  <option value="views">
    🔥 Most Viewed
  </option>

  <option value="az">
    🔤 A-Z
  </option>

  <option value="random">
    🔀 Random
  </option>

</select>

<select
id="languageSelect"
class="select"
>

  <option value="all">
    🌍 All
  </option>

  <option value="arabic">
    🇸🇦 Arabic
  </option>

  <option value="english">
    🇺🇸 English
  </option>

  <option value="russian">
    🇷🇺 Russian
  </option>

  <option value="turkish">
    🇹🇷 Turkish
  </option>

</select>

</header>

<div
id="feed"
class="feed"
>
</div>

<script>

const WORKER =
'https://telegram-proxy.mohamed-ahmed408408.workers.dev/?channel=';

const BATCH = 10;

let allChannels = [];

let filteredChannels = [];

let usedIndexes = new Set();

let isLoading = false;

let searchQ = '';

let currentLanguage = 'all';

// HELPERS

function shuffle(arr){

  return arr
  .slice()
  .sort(()=>Math.random()-.5)

}

function avatarText(t){

  if(!t) return '?';

  return t
  .slice(0,2)
  .toUpperCase()

}

function matchSearch(ch,q){

  if(!q) return true;

  return (

    (ch.title || '')
    .toLowerCase()
    .includes(q)

    ||

    (ch.username || '')
    .toLowerCase()
    .includes(q)

  )

}

function detectLanguage(text){

  if(!text)
    return 'unknown';

  if(/[؀-ۿ]/.test(text))
    return 'arabic';

  if(/[А-Яа-яЁё]/.test(text))
    return 'russian';

  if(/[şğıüçö]/i.test(text))
    return 'turkish';

  if(/[a-z]/i.test(text))
    return 'english';

  return 'other';

}

// PARSE HTML

function parseLastPost(html){

  const parser =
  new DOMParser();

  const doc =
  parser.parseFromString(
    html,
    'text/html'
  );

  const posts =
  doc.querySelectorAll(
    '.tgme_widget_message_wrap'
  );

  if(!posts.length)
    return null;

  const last =
  posts[posts.length - 1];

  let text = '';

  const textEl =
  last.querySelector(
    '.tgme_widget_message_text'
  );

  if(textEl){

    text =
    textEl.innerHTML.trim();

  }

  let img = null;

  const imgEl =
  last.querySelector(
    '.tgme_widget_message_photo_wrap'
  );

  if(imgEl){

    const style =
    imgEl.getAttribute(
      'style'
    ) || '';

    const match =
    style.match(
      /url\(['"]?([^'")]+)['"]?\)/
    );

    if(match){

      img = match[1];

    }

  }

  let date = '';

  const dateEl =
  last.querySelector(
    '.tgme_widget_message_date time'
  );

  if(dateEl){

    date =
    dateEl.getAttribute(
      'datetime'
    ) || '';

  }

  let views = '';

  const viewEl =
  last.querySelector(
    '.tgme_widget_message_views'
  );

  if(viewEl){

    views =
    viewEl.textContent.trim();

  }

  return {

    text,
    img,
    date,
    views

  }

}

// CARD

function makeCard(channel,post){

  const card =
  document.createElement('div');

  card.className =
  'post-card';

  card.innerHTML = `

    <div class="post-head">

      <div class="avatar">

        ${avatarText(
          channel.title ||
          channel.username
        )}

      </div>

      <div class="post-meta">

        <a
        class="post-channel"
        href="https://t.me/${channel.username}"
        target="_blank"
        >

        ${channel.title || channel.username}

        </a>

        <div class="post-date">

          ${new Date(post.date)
            .toLocaleString()}

        </div>

      </div>

      <a
      class="open-btn"
      href="https://t.me/${channel.username}"
      target="_blank"
      >

      Open

      </a>

    </div>

    ${
      post.img

      ?

      `<img
        class="post-img"
        src="${post.img}"
        loading="lazy"
      >`

      :

      ''
    }

    ${
      post.text

      ?

      `<div class="post-text">

        ${post.text}

      </div>`

      :

      ''
    }

    <div class="post-foot">

      <div class="views">

        👁️ ${post.views || 0}

      </div>

    </div>

  `;

  return card;

}

// FETCH

async function fetchAndRender(channel){

  try{

    const res =
    await fetch(

      WORKER +
      channel.username,

      {
        signal:
        AbortSignal.timeout(8000)
      }

    );

    const html =
    await res.text();

    const post =
    parseLastPost(html);

    if(
      !post
      ||
      (
        !post.text
        &&
        !post.img
      )
    ){

      return;

    }

    channel.lastViews =
    parseInt(

      (post.views || '0')
      .replace(/[^\d]/g,'')

    ) || 0;

    channel.lastDate =
    new Date(
      post.date || 0
    ).getTime();

    channel.language =
    detectLanguage(
      post.text || ''
    );

    const card =
    makeCard(channel,post);

    const loadWrap =
    document.getElementById(
      'loadWrap'
    );

    document
    .getElementById('feed')
    .insertBefore(
      card,
      loadWrap
    );

  }catch(e){

    console.log(e);

  }

}

// LOAD BATCH

async function loadBatch(){

  if(isLoading)
    return;

  isLoading = true;

  const btn =
  document.getElementById(
    'loadBtn'
  );

  if(btn){

    btn.disabled = true;

    btn.innerText =
    'Loading...';

  }

  const pending = [];

  for(
    let i=0;
    i<filteredChannels.length;
    i++
  ){

    if(
      pending.length >= BATCH
    ) break;

    if(
      usedIndexes.has(i)
    ) continue;

    usedIndexes.add(i);

    pending.push(

      fetchAndRender(
        filteredChannels[i]
      )

    );

  }

  await Promise.allSettled(
    pending
  );

  isLoading = false;

  if(btn){

    btn.disabled = false;

    btn.innerText =
    'Load More';

  }

}

// INIT FEED

function initFeed(){

  usedIndexes.clear();

  const feed =
  document.getElementById(
    'feed'
  );

  feed.innerHTML = '';

  const wrap =
  document.createElement(
    'div'
  );

  wrap.className =
  'load-wrap';

  wrap.id =
  'loadWrap';

  wrap.innerHTML = `

    <button
    id="loadBtn"
    class="load-btn"
    >

      Load More

    </button>

  `;

  feed.appendChild(wrap);

  document
  .getElementById('loadBtn')
  .onclick = loadBatch;

  loadBatch();

}

// FILTERS

function applyFilters(){

  filteredChannels =
  allChannels.filter(ch =>

    ch.username
    &&
    matchSearch(
      ch,
      searchQ
    )
    &&
    (
      currentLanguage === 'all'
      ||
      ch.language === currentLanguage
    )

  );

  const sort =
  document.getElementById(
    'sortSelect'
  ).value;

  if(sort === 'newest'){

    filteredChannels.sort(
      (a,b)=>

      (b.lastDate || 0)
      -
      (a.lastDate || 0)

    );

  }

  if(sort === 'views'){

    filteredChannels.sort(
      (a,b)=>

      (b.lastViews || 0)
      -
      (a.lastViews || 0)

    );

  }

  if(sort === 'az'){

    filteredChannels.sort(
      (a,b)=>

      (a.title || a.username)
      .localeCompare(
        b.title || b.username
      )

    );

  }

  if(sort === 'random'){

    filteredChannels =
    shuffle(filteredChannels);

  }

  initFeed();

}

// LOAD JSON

async function loadChannels(){

  try{

    const r =
    await fetch(
      './channels_data.json'
    );

    allChannels =
    await r.json();

  }catch(e){

    allChannels = [];

  }

  applyFilters();

}

// EVENTS

document
.getElementById('search')
.addEventListener('input',e=>{

  searchQ =
  e.target.value
  .toLowerCase()
  .trim();

  applyFilters();

});

document
.getElementById('sortSelect')
.addEventListener('change',()=>{

  applyFilters();

});

document
.getElementById('languageSelect')
.addEventListener(
  'change',
  e=>{

    currentLanguage =
    e.target.value;

    applyFilters();

});

loadChannels();

</script>

</body>

</html>
