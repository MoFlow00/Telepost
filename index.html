<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TELEPOSTS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f7fb;--surface:#fff;--border:#e5e9f0;
  --text:#111;--text2:#555;--text3:#9ca3af;
  --accent:#0095f6;--tag-bg:#eef2f7;--success:#22c55e;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0a0a0a;--surface:#141414;--border:#242424;
    --text:#f0f0f0;--text2:#aaa;--text3:#666;--tag-bg:#1e1e1e;
  }
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}
.header{
  position:sticky;top:0;z-index:999;
  background:rgba(255,255,255,.9);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);padding:12px;
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
}
@media(prefers-color-scheme:dark){.header{background:rgba(20,20,20,.9)}}
.logo{font-size:18px;font-weight:700;flex-shrink:0}
.logo span{color:var(--accent)}
.search{
  flex:1;min-width:120px;padding:10px 14px;border:none;
  border-radius:18px;background:var(--tag-bg);color:var(--text);outline:none;
}
.select{
  padding:10px 12px;border:none;border-radius:18px;
  background:var(--tag-bg);color:var(--text);outline:none;
}
.feed{
  max-width:680px;margin:auto;padding:16px 12px 70px;
  display:flex;flex-direction:column;gap:18px;
}
.post-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:22px;overflow:hidden;
  box-shadow:0 4px 18px rgba(0,0,0,.07);
  transition:transform .2s,box-shadow .2s;
}
.post-card:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.12)}
.post-head{display:flex;align-items:center;gap:12px;padding:14px}
.avatar{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#0095f6,#7c3aed);
  color:white;display:flex;align-items:center;
  justify-content:center;font-weight:700;flex-shrink:0;font-size:14px;
}
.post-meta{flex:1;min-width:0}
.post-channel{
  font-size:14px;font-weight:700;color:var(--text);
  text-decoration:none;display:block;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
}
.post-date{margin-top:2px;font-size:11px;color:var(--text3)}
.open-btn{
  padding:8px 14px;border-radius:20px;background:var(--accent);
  color:white;text-decoration:none;font-size:12px;font-weight:700;flex-shrink:0;
}
.post-img{width:100%;max-height:500px;object-fit:cover;display:block;background:#0001}
.post-text{padding:14px;font-size:14px;line-height:1.7;word-break:break-word;color:var(--text2)}
.post-text a{color:var(--accent);text-decoration:none}
.post-foot{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-top:1px solid var(--border);
}
.stat{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:4px}
.trending-badge{
  background:linear-gradient(135deg,#ff6b6b,#ee5a24);
  color:white;padding:2px 8px;border-radius:10px;
  font-size:10px;font-weight:700;margin-left:6px;
}
.copy-btn{
  margin-left:auto;border:none;background:var(--tag-bg);
  color:var(--text);padding:7px 12px;border-radius:18px;
  cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;
}
.copy-btn:hover{background:var(--accent);color:white}
.copy-btn.copied{background:var(--success);color:white}
.spinner-wrap{padding:20px;text-align:center;display:none}
.spinner-wrap.active{display:block}
.spinner{
  width:28px;height:28px;border-radius:50%;
  border:3px solid var(--tag-bg);border-top-color:var(--accent);
  animation:spin .7s linear infinite;margin:auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{
  text-align:center;padding:40px 20px;color:var(--text3);
}
@media(max-width:768px){
  .header{flex-wrap:wrap}
  .search{width:100%;order:3}
  .select{flex:1;min-width:100px}
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">TELE<span>POSTS</span></div>
  
  <input id="search" class="search" placeholder="🔍 Search channels...">
  
  <select id="sortSelect" class="select">
    <option value="trending">🔥 Trending</option>
    <option value="newest">🕒 Newest</option>
    <option value="biggest">👑 Biggest</option>
    <option value="fastgrowing">🚀 Fast Growing</option>
    <option value="hiddengems">💎 Hidden Gems</option>
    <option value="az">🔤 A-Z</option>
  </select>
  
  <select id="langSelect" class="select">
    <option value="arabic">🇸🇦 AR</option>
    <option value="english">🇺🇸 EN</option>
    <option value="russian">🇷🇺 RU</option>
    <option value="turkish">🇹🇷 TR</option>
    <option value="persian">🇮🇷 FA</option>
    <option value="other">🔡 Other</option>
    <option value="all">🌍 All</option>
  </select>
</header>

<div id="feed" class="feed"></div>
<div class="spinner-wrap" id="spinnerWrap"><div class="spinner"></div></div>
<div id="emptyState" class="empty-state" style="display:none">No posts found 😕</div>

<script>
/**
 * ⚙️ CONFIGURATION - اضبط القيم هنا للتحكم في الأداء والحدود
 */
const CONFIG = {
  WORKER_URL: 'https://telegram-proxy.mohamed-ahmed408408.workers.dev/?channel=',
  
  // 🚦 Cloudflare Rate Limiting Settings
  BATCH_SIZE: 6,              // عدد القنوات لكل دفعة (قلل لتجنب الحظر)
  CONCURRENT_REQUESTS: 3,     // طلبات متزامنة كحد أقصى
  REQUEST_DELAY: 800,         // تأخير بين الدفعات (مللي ثانية)
  RETRY_ATTEMPTS: 2,          // محاولات إعادة عند الفشل
  RETRY_DELAY: 1500,          // تأخير قبل إعادة المحاولة
  
  // 🧠 Cache Settings
  CACHE_TTL: 15 * 60 * 1000,  // عمر الكاش: 15 دقيقة
  
  // 📊 Trending Algorithm Weights
  TRENDING_WEIGHTS: {
    views: 0.35,              // وزن عدد المشاهدات
    engagement: 0.40,         // وزن التفاعل (مشاهدات/مشتركين)
    freshness: 0.20,          // وزن حداثة النشر
    velocity: 0.05            // وزن سرعة النمو
  },
  
  // 🕐 وقت صلاحية المنشور للتريند (بالساعات)
  TRENDING_MAX_AGE_HOURS: 72, // 3 أيام فقط
  
  // 🔞 كلمات الفلترة
  NSFW_WORDS: [
    'porn','xxx','sex','nude','onlyfans','hentai',
    'سكس','نيك','اباحي','شرموطة','عري'
  ]
};

/**
 * 🗄️ Smart Cache with TTL
 */
class SmartCache {
  constructor(ttl = CONFIG.CACHE_TTL) {
    this.cache = new Map();
    this.ttl = ttl;
  }
  
  set(key, value) {
    this.cache.set(key, {
      value,
      timestamp: Date.now()
    });
  }
  
  get(key) {
    const item = this.cache.get(key);
    if (!item) return null;
    
    // تحقق من انتهاء الصلاحية
    if (Date.now() - item.timestamp > this.ttl) {
      this.cache.delete(key);
      return null;
    }
    return item.value;
  }
  
  clear() {
    this.cache.clear();
  }
  
  cleanup() {
    // تنظيف العناصر منتهية الصلاحية
    for (const [key, item] of this.cache) {
      if (Date.now() - item.timestamp > this.ttl) {
        this.cache.delete(key);
      }
    }
  }
}

/**
 * 🚦 Rate Limiter Queue - للتحكم في تدفق الطلبات
 */
class RequestQueue {
  constructor(config) {
    this.queue = [];
    this.processing = false;
    this.config = config;
    this.lastRequestTime = 0;
  }
  
  async add(task) {
    return new Promise((resolve, reject) => {
      this.queue.push({ task, resolve, reject });
      this.process();
    });
  }
  
  async process() {
    if (this.processing || this.queue.length === 0) return;
    
    this.processing = true;
    
    while (this.queue.length > 0) {
      // احترام التأخير بين الطلبات
      const now = Date.now();
      const timeSinceLast = now - this.lastRequestTime;
      
      if (timeSinceLast < CONFIG.REQUEST_DELAY) {
        await this.sleep(CONFIG.REQUEST_DELAY - timeSinceLast);
      }
      
      const { task, resolve, reject } = this.queue.shift();
      
      try {
        const result = await this.executeWithRetry(task);
        resolve(result);
      } catch (error) {
        reject(error);
      }
      
      this.lastRequestTime = Date.now();
    }
    
    this.processing = false;
  }
  
  async executeWithRetry(task, attempts = 0) {
    try {
      return await task();
    } catch (error) {
      if (attempts < CONFIG.RETRY_ATTEMPTS) {
        await this.sleep(CONFIG.RETRY_DELAY * (attempts + 1));
        return this.executeWithRetry(task, attempts + 1);
      }
      throw error;
    }
  }
  
  sleep(ms) {
    return new Promise(res => setTimeout(res, ms));
  }
}

/**
 * 🌐 Global Instances
 */
const cache = new SmartCache();
const requestQueue = new RequestQueue();

/**
 * 📊 State Management
 */
const state = {
  allChannels: [],
  filteredPool: [],
  currentIndex: 0,
  isLoading: false,
  hasMore: true,
  
  filters: {
    sort: 'trending',
    lang: 'arabic',
    search: ''
  }
};

/**
 * 🔍 Language Detection - محسّن
 */
function detectLanguage(text) {
  if (!text) return 'other';
  const clean = text.replace(/<[^>]*>/g, '').toLowerCase();
  
  // Arabic & Persian
  if (/[\u0600-\u06FF]/.test(clean)) {
    return /[پگچژکی]/.test(clean) ? 'persian' : 'arabic';
  }
  // Russian
  if (/[А-Яа-яЁё]/.test(clean)) return 'russian';
  // Turkish
  if (/[şğıüçöİĞŞ]/i.test(clean)) return 'turkish';
  // English
  if (/[a-zA-Z]/.test(clean)) return 'english';
  
  return 'other';
}

/**
 * 👁️ Parse Views - تحويل النصوص لأرقام
 */
function parseViews(value) {
  if (!value) return 0;
  const str = String(value).replace(/,/g, '').trim();
  
  if (/K$/i.test(str)) return Math.round(parseFloat(str) * 1000);
  if (/M$/i.test(str)) return Math.round(parseFloat(str) * 1000000);
  
  return parseInt(str.replace(/[^\d]/g, '')) || 0;
}

/**
 * 🕐 Format Date - عرض الوقت بشكل ذكي
 */
function formatRelativeTime(dateString) {
  if (!dateString) return '';
  
  try {
    const date = new Date(dateString);
    const now = new Date();
    const seconds = Math.floor((now - date) / 1000);
    
    if (seconds < 60) return 'Just now';
    if (seconds < 3600) return `${Math.floor(seconds/60)}m ago`;
    if (seconds < 86400) return `${Math.floor(seconds/3600)}h ago`;
    if (seconds < 604800) return `${Math.floor(seconds/86400)}d ago`;
    
    return date.toLocaleDateString(undefined, { 
      month: 'short', day: 'numeric' 
    });
  } catch {
    return '';
  }
}

/**
 * 📰 Parse Telegram Post - استخراج البيانات من HTML
 */
function parseLastPost(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const messages = doc.querySelectorAll('.tgme_widget_message_wrap');
  
  if (!messages.length) return null;
  
  const last = messages[messages.length - 1];
  
  // Extract text
  const textEl = last.querySelector('.tgme_widget_message_text');
  const text = textEl?.innerHTML.trim() || '';
  
  // Extract image
  let image = null;
  const photoWrap = last.querySelector('.tgme_widget_message_photo_wrap');
  if (photoWrap) {
    const style = photoWrap.getAttribute('style') || '';
    const match = style.match(/url\(['"]?([^'")]+)['"]?\)/);
    if (match) image = match[1];
  }
  
  // Extract date & views
  const dateEl = last.querySelector('.tgme_widget_message_date time');
  const viewEl = last.querySelector('.tgme_widget_message_views');
  const postEl = last.querySelector('[data-post]');
  
  return {
    text,
    image,
    date: dateEl?.getAttribute('datetime') || '',
    views: viewEl?.textContent.trim() || '',
    postId: postEl?.getAttribute('data-post') || ''
  };
}

/**
 * 🔥 Trending Score Algorithm - الخوارزمية المحسّنة
 * 
 * المعادلة: 
 * Score = (Views × W1) + (Engagement × W2) + (Freshness × W3) + (Velocity × W4)
 */
function calculateTrendingScore(channel) {
  const { views = 0, subscribers = 1, last_post_timestamp = 0 } = channel;
  
  // 1. حساب العمر بالساعات
  const ageHours = (Date.now()/1000 - last_post_timestamp) / 3600;
  
  // استبعاد المنشورات القديمة جداً
  if (ageHours > CONFIG.TRENDING_MAX_AGE_HOURS) return 0;
  
  // 2. عامل الحداثة (أحدث = أعلى درجة) - منحنى أسي
  const freshness = Math.exp(-ageHours / 24); // نصف العمر: 24 ساعة
  
  // 3. معدل التفاعل (مشاهدات لكل مشترك)
  const engagement = subscribers > 0 ? views / subscribers : 0;
  
  // 4. سرعة النمو (تقريبي: مشاهدات/ساعة)
  const velocity = ageHours > 0 ? views / ageHours : views;
  
  // 5. حساب الدرجة النهائية بالأوزان
  const { views: w1, engagement: w2, freshness: w3, velocity: w4 } = CONFIG.TRENDING_WEIGHTS;
  
  const score = 
    (Math.log10(views + 1) * 100 * w1) +      // لوغاريتمي لتجنب هيمنة الأرقام الكبيرة
    (engagement * 10000 * w2) +                 // تفاعل عالي = تريند
    (freshness * 5000 * w3) +                   // حداثة مهمة
    (Math.log10(velocity + 1) * 500 * w4);      // نمو سريع
  
  return score;
}

/**
 * 🎯 Build Filtered & Sorted Pool
 */
function buildPool() {
  const { sort, lang, search } = state.filters;
  const query = search.toLowerCase();
  
  // 1. فلترة البحث
  let pool = state.allChannels.filter(ch => {
    if (!ch.username) return false;
    if (!query) return true;
    
    const title = (ch.title || '').toLowerCase();
    const username = (ch.username || '').toLowerCase();
    return title.includes(query) || username.includes(query);
  });
  
  // 2. فلترة اللغة (لا تطبق على Trending للحفاظ على التنوع)
  if (lang !== 'all' && sort !== 'trending') {
    pool = pool.filter(ch => {
      if (!ch.detectedLang) return true;
      return ch.detectedLang === lang;
    });
  }
  
  // 3. الفرز حسب النوع المختار
  switch (sort) {
    case 'trending':
      pool = pool
        .filter(ch => {
          const age = (Date.now()/1000 - (ch.last_post_timestamp||0)) / 3600;
          return age <= CONFIG.TRENDING_MAX_AGE_HOURS;
        })
        .sort((a, b) => calculateTrendingScore(b) - calculateTrendingScore(a));
      break;
      
    case 'newest':
      pool.sort((a, b) => (b.last_post_timestamp||0) - (a.last_post_timestamp||0));
      break;
      
    case 'biggest':
      pool.sort((a, b) => (b.subscribers||0) - (a.subscribers||0));
      break;
      
    case 'fastgrowing':
      pool.sort((a, b) => {
        const rateA = (a.last_post_views||0) / Math.max(a.subscribers||1, 1);
        const rateB = (b.last_post_views||0) / Math.max(b.subscribers||1, 1);
        return rateB - rateA;
      });
      break;
      
    case 'hiddengems':
      pool.sort((a, b) => {
        const score = (ch) => {
          const subs = ch.subscribers || 1;
          if (subs >= 50000) return 0; // استبعاد القنوات الكبيرة
          return (ch.last_post_views||0) / Math.log(subs + 2);
        };
        return score(b) - score(a);
      });
      break;
      
    case 'az':
      pool.sort((a, b) => 
        (a.title || a.username).localeCompare(b.title || b.username)
      );
      break;
  }
  
  return pool;
}

/**
 * 🛡️ NSFW Filter
 */
function isSafeContent(channel, post) {
  const content = `${post.text || ''} ${channel.title || ''}`.toLowerCase();
  return !CONFIG.NSFW_WORDS.some(word => content.includes(word));
}

/**
 * 🌐 Fetch Channel Data - مع الحماية من Cloudflare
 */
async function fetchChannelData(channel) {
  const cached = cache.get(channel.username);
  if (cached) return cached;
  
  const fetchTask = async () => {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 5000);
    
    try {
      const response = await fetch(CONFIG.WORKER_URL + channel.username, {
        signal: controller.signal,
        headers: { 'Accept': 'text/html' }
      });
      
      clearTimeout(timeout);
      
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const html = await response.text();
      const post = parseLastPost(html);
      
      if (!post || (!post.text && !post.image)) return null;
      if (!isSafeContent(channel, post)) return null;
      
      // تحديث بيانات القناة
      channel.detectedLang = detectLanguage(post.text);
      channel.last_post_views = parseViews(post.views);
      
      const result = { channel, post };
      cache.set(channel.username, result);
      
      return result;
      
    } catch (error) {
      clearTimeout(timeout);
      console.warn(`Failed to fetch ${channel.username}:`, error.message);
      return null;
    }
  };
  
  return requestQueue.add(fetchTask);
}

/**
 * 🎴 Create Post Card Element
 */
function createCard(channel, post, trendingRank) {
  const postUrl = post.postId 
    ? `https://t.me/${post.postId}` 
    : `https://t.me/${channel.username}`;
    
  const card = document.createElement('div');
  card.className = 'post-card';
  
  const initials = (channel.title || channel.username).slice(0,2).toUpperCase();
  const isTrending = trendingRank && trendingRank <= 10;
  
  card.innerHTML = `
    <div class="post-head">
      <div class="avatar">${initials}</div>
      <div class="post-meta">
        <a class="post-channel" href="https://t.me/${channel.username}" target="_blank">
          ${channel.title || channel.username}
          ${isTrending ? `<span class="trending-badge">#${trendingRank}</span>` : ''}
        </a>
        <div class="post-date">${formatRelativeTime(post.date)}</div>
      </div>
      <a class="open-btn" href="${postUrl}" target="_blank">Open</a>
    </div>
    
    ${post.image ? `<img class="post-img" src="${post.image}" loading="lazy" alt="Post">` : ''}
    
    ${post.text ? `<div class="post-text">${post.text}</div>` : ''}
    
    <div class="post-foot">
      <span class="stat">👁️ ${post.views || '–'}</span>
      <button class="copy-btn" data-url="${postUrl}">Copy</button>
    </div>
  `;
  
  // Copy button handler
  const copyBtn = card.querySelector('.copy-btn');
  copyBtn.addEventListener('click', (e) => {
    e.preventDefault();
    navigator.clipboard.writeText(copyBtn.dataset.url);
    
    copyBtn.textContent = 'Copied!';
    copyBtn.classList.add('copied');
    
    setTimeout(() => {
      copyBtn.textContent = 'Copy';
      copyBtn.classList.remove('copied');
    }, 1500);
  });
  
  return card;
}

/**
 * 📦 Load Batch of Posts
 */
async function loadBatch() {
  if (state.isLoading || !state.hasMore) return;
  
  state.isLoading = true;
  document.getElementById('spinnerWrap').classList.add('active');
  
  const { filteredPool } = state;
  const startIndex = state.currentIndex;
  const endIndex = Math.min(startIndex + CONFIG.BATCH_SIZE, filteredPool.length);
  
  if (startIndex >= filteredPool.length) {
    state.hasMore = false;
    document.getElementById('spinnerWrap').classList.remove('active');
    state.isLoading = false;
    return;
  }
  
  const batch = filteredPool.slice(startIndex, endIndex);
  state.currentIndex = endIndex;
  
  // تحميل متوازي مع احترام الحدود
  const results = await Promise.allSettled(
    batch.map(ch => fetchChannelData(ch))
  );
  
  // عرض النتائج
  const fragment = document.createDocumentFragment();
  let added = 0;
  
  results.forEach((result, idx) => {
    if (result.status === 'fulfilled' && result.value) {
      const { channel, post } = result.value;
      const rank = state.filters.sort === 'trending' ? (startIndex + added + 1) : null;
      
      fragment.appendChild(createCard(channel, post, rank));
      added++;
    }
  });
  
  if (added > 0) {
    document.getElementById('feed').appendChild(fragment);
  }
  
  // تحقق من النهاية
  if (state.currentIndex >= filteredPool.length) {
    state.hasMore = false;
  }
  
  // عرض رسالة "لا يوجد نتائج" إذا لزم
  const feed = document.getElementById('feed');
  const empty = document.getElementById('emptyState');
  
  if (feed.children.length === 0 && !state.isLoading) {
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
  }
  
  document.getElementById('spinnerWrap').classList.remove('active');
  state.isLoading = false;
}

/**
 * 🔄 Apply Filters & Reset Feed
 */
function applyFilters() {
  state.filteredPool = buildPool();
  state.currentIndex = 0;
  state.hasMore = true;
  
  document.getElementById('feed').innerHTML = '';
  document.getElementById('emptyState').style.display = 'none';
  
  // تحميل الدفعة الأولى
  loadBatch();
}

/**
 * 🔍 Debounced Search
 */
function debounce(func, wait) {
  let timeout;
  return function executedFunction(...args) {
    const later = () => {
      clearTimeout(timeout);
      func(...args);
    };
    clearTimeout(timeout);
    timeout = setTimeout(later, wait);
  };
}

const debouncedSearch = debounce((value) => {
  state.filters.search = value.toLowerCase().trim();
  applyFilters();
}, 300);

/**
 * 🎛️ Event Listeners
 */
function setupEvents() {
  // Search
  document.getElementById('search').addEventListener('input', (e) => {
    debouncedSearch(e.target.value);
  });
  
  // Sort Change
  document.getElementById('sortSelect').addEventListener('change', (e) => {
    state.filters.sort = e.target.value;
    applyFilters();
  });
  
  // Language Change
  document.getElementById('langSelect').addEventListener('change', (e) => {
    state.filters.lang = e.target.value;
    cache.clear(); // مسح الكاش عند تغيير اللغة
    applyFilters();
  });
  
  // Infinite Scroll
  window.addEventListener('scroll', () => {
    const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
    
    if (scrollTop + clientHeight >= scrollHeight - 1000) {
      loadBatch();
    }
  });
  
  // Visibility Change - تنظيف الكاش عند الخروج
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      cache.cleanup();
    }
  });
}

/**
 * 🚀 Initialize App
 */
async function init() {
  try {
    const response = await fetch('./channels_data.json');
    state.allChannels = await response.json();
    state.allChannels = state.allChannels.filter(c => c.username);
    
  } catch (error) {
    console.error('Failed to load channels:', error);
    state.allChannels = [];
  }
  
  // Set defaults
  document.getElementById('langSelect').value = 'arabic';
  document.getElementById('sortSelect').value = 'trending';
  
  setupEvents();
  applyFilters();
  
  // تنظيف دوري للكاش كل 5 دقائق
  setInterval(() => cache.cleanup(), 5 * 60 * 1000);
}

// Start
init();
</script>
</body>
</html>
