<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TELEPOSTS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f7fb;--surface:#fff;--border:#e5e9f0;
  --text:#111;--text2:#555;--text3:#9ca3af;
  --accent:#0095f6;--tag-bg:#eef2f7;
  --header-h:54px;--tags-h:46px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0a0a0a;--surface:#141414;--border:#242424;
    --text:#f0f0f0;--text2:#aaa;--text3:#555;--tag-bg:#1e1e1e;
  }
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ── */
.header{
  position:sticky;top:0;z-index:999;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  height:var(--header-h);
  display:flex;align-items:center;
  padding:0 14px;gap:10px;
}
@media(prefers-color-scheme:dark){
  .header{background:rgba(20,20,20,.92)}
}
.logo{font-size:18px;font-weight:700;flex-shrink:0;color:var(--text);letter-spacing:-.3px}
.logo span{color:var(--accent)}
.search-wrap{flex:1;position:relative;min-width:0}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;pointer-events:none}
.search{
  width:100%;padding:8px 10px 8px 32px;
  border:1.5px solid var(--border);border-radius:22px;
  background:var(--tag-bg);color:var(--text);
  font-size:13px;outline:none;font-family:'Inter',sans-serif;
  transition:border-color .2s;
}
.search:focus{border-color:var(--accent)}

/* sort + language selects */
.hdr-select{
  padding:7px 10px;border:1.5px solid var(--border);
  border-radius:22px;background:var(--tag-bg);color:var(--text);
  font-size:12px;font-weight:500;outline:none;cursor:pointer;
  font-family:'Inter',sans-serif;flex-shrink:0;
  transition:border-color .2s;
}
.hdr-select:focus{border-color:var(--accent)}

/* ── SECTIONS ── */

.sections-bar{

  position:sticky;
  top:54px;
  z-index:998;

  display:flex;
  gap:8px;

  overflow-x:auto;

  padding:10px 12px;

  background:var(--bg);

}

.sections-bar::-webkit-scrollbar{

  display:none;

}

.section-btn{

  flex-shrink:0;

  border:none;

  background:var(--tag-bg);

  color:var(--text);

  padding:8px 14px;

  border-radius:999px;

  font-size:12px;

  cursor:pointer;

}

.section-btn.active{

  background:var(--accent);

  color:#fff;

}

/* ── TAGS ── */
.tags-bar{
  position:sticky;top:var(--header-h);z-index:998;
  background:var(--surface);border-bottom:1px solid var(--border);
  height:var(--tags-h);
  display:flex;align-items:center;gap:6px;
  padding:0 12px;overflow-x:auto;scrollbar-width:none;
}
.tags-bar::-webkit-scrollbar{display:none}
.tag{
  flex-shrink:0;padding:5px 13px;border-radius:22px;
  font-size:12px;font-weight:500;cursor:pointer;
  background:var(--tag-bg);color:var(--text2);
  border:1.5px solid transparent;transition:all .15s;white-space:nowrap;
}
.tag:hover{border-color:var(--accent);color:var(--accent)}
.tag.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── FEED ── */
.feed{max-width:640px;margin:0 auto;padding:16px 12px 60px;display:flex;flex-direction:column;gap:16px}

/* ── CARD ── */ /* CHANGE #7 */
.post-card{
  background:var(--surface);
  border:1px solid var(--border); /* Keep */
  border-radius:20px;overflow:hidden; /* Keep */
  box-shadow:0 4px 16px rgba(0,0,0,.08); /* Stronger shadow */
  animation:fadeUp .3s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.post-head{display:flex;align-items:center;gap:11px;padding:13px 14px 10px}
.avatar{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:14px;font-weight:700;flex-shrink:0;
}
.post-meta{flex:1;min-width:0}
.post-channel{
  font-size:14px;font-weight:700;color:var(--text);
  text-decoration:none;display:block;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.post-channel:hover{color:var(--accent)}
.post-date{font-size:11px;color:var(--text3);margin-top:2px}
.lang-badge{
  display:inline-block;margin-left:5px;
  font-size:10px;padding:1px 6px;border-radius:8px;
  background:var(--tag-bg);color:var(--text3);font-weight:600;
}
.open-btn{
  padding:7px 14px;border-radius:22px;
  background:var(--accent);color:#fff;
  text-decoration:none;font-size:12px;font-weight:700;
  flex-shrink:0;transition:opacity .2s;
}
.open-btn:hover{opacity:.85}

.post-img{width:100%;max-height:420px;object-fit:cover;display:block;background:var(--tag-bg)}

.post-text{
  padding:12px 14px;font-size:14px;line-height:1.65;
  word-break:break-word;color:var(--text);
}
.hashtags{

  display:flex;

  flex-wrap:wrap;

  gap:8px;

  padding:0 14px 14px;

}

.hashtag{

  background:var(--tag-bg);

  color:var(--text2);

  font-size:11px;

  padding:5px 10px;

  border-radius:999px;

}
.post-text a{color:var(--accent);text-decoration:none}
.post-text.clamped{
  display:-webkit-box;-webkit-line-clamp:5;
  -webkit-box-orient:vertical;overflow:hidden;
}
.read-more{
  padding:0 14px 10px;font-size:13px;
  color:var(--accent);cursor:pointer;display:block;
}

.post-foot{
  display:flex;align-items:center;gap:14px;
  padding:8px 14px 13px;border-top:1px solid var(--border);
}
.stat{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3)}
.stat svg{width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:1.8;stroke-linecap:round}
.copy-btn{

  margin-left:auto;

  border:none;

  background:var(--tag-bg);

  color:var(--text);

  border-radius:999px;

  padding:7px 14px;

  font-size:12px;

  cursor:pointer;

}

/* ── SKELETON ── */
.skeleton{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;overflow:hidden;padding:13px 14px;
  box-shadow:0 2px 12px rgba(0,0,0,.04);
}
.sk{background:var(--tag-bg);border-radius:8px;animation:sk 1.4s ease-in-out infinite}
@keyframes sk{0%,100%{opacity:1}50%{opacity:.35}}
.sk-row{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.sk-circle{width:42px;height:42px;border-radius:50%;flex-shrink:0}
.sk-img{width:100%;height:180px;border-radius:10px;margin-bottom:10px}

/* ── SENTINEL (infinite scroll trigger) ── */
#sentinel{height:1px}

/* ── SPINNER ── */
.spinner-wrap{padding:20px;text-align:center;display:none}
.spinner-wrap.active{display:block}
.spinner{
  width:28px;height:28px;border-radius:50%;
  border:3px solid var(--tag-bg);
  border-top-color:var(--accent);
  animation:spin .7s linear infinite;
  margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── EMPTY ── */
.empty{padding:60px 20px;text-align:center;color:var(--text3);font-size:14px}

/* ── NEWEST SORT NOTICE ── */
</style>
</head>
<body>

<header class="header">
  <div class="logo">TELE<span>POSTS</span></div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" class="search" placeholder="Search…" autocomplete="off">

<div class="sections-bar">

<button class="section-btn active" data-sort="newest">
🕒 Latest

<button class="section-btn" data-sort="views">
🔥 Trending
</button>

<button class="section-btn" data-sort="growing">
🚀 Fast Growing
</button>

<button class="section-btn" data-sort="biggest">
👑 Biggest
</button>

💎 Hidden Gems
</button>

</div>

<div class="tags-bar" id="tagsBar"></div>

<div class="feed" id="feed">
  <div id="sentinel"></div>
</div>
<div class="spinner-wrap" id="spinnerWrap"><div class="spinner"></div></div>

<script>

const WORKER =
'https://telegram-proxy.mohamed-ahmed408408.workers.dev/?channel=';

const BATCH = 20;

const CONCURRENT = 12;

  const NSFW_WORDS = [

  // english

  'porn',
  'xxx',
  'sex',
  'nude',
  'onlyfans',
  'nsfw',
  'escort',
  'adult',
  'camgirl',
  'hentai',

  // arabic

  'سكس',
  'نيك',
  'ممحونة',
  'ممحون',
  'اباحي',
  'جنس',
  'شرموطة',

  // common domains

  'xnxx',
  'xvideos',
  'pornhub'

];

const CACHE = new Map();

let allChannels = [];

let pool = [];

let poolIndex = 0;

let isLoading = false;

let searchQ = '';

let activeLang = 'arabic';

let activeSort = 'newest';

document
.querySelectorAll('.section-btn')
.forEach(btn=>{

  btn.addEventListener('click',()=>{

    document
    .querySelectorAll('.section-btn')
    .forEach(
      b=>b.classList.remove('active')
    );

    btn.classList.add('active');

    activeSort =
    btn.dataset.sort;

    applyFilters();

  });

});


// ─────────────────────────────
// LANGUAGE
// ─────────────────────────────

function detectLang(text){

  if(!text) return 'other';

  const plain =
  text.replace(/<[^>]*>/g,'');

  if(/[\u0600-\u06FF]/.test(plain)){

    if(/[پگچژكي]/.test(plain)){
      return 'persian';
    }

    return 'arabic';

  }

  if(/[А-Яа-яЁё]/.test(plain)){
    return 'russian';
  }

  if(/[şğıüçöİĞŞ]/i.test(plain)){
    return 'turkish';
  }

  if(/[a-z]/i.test(plain)){
    return 'english';
  }

  return 'other';

}


// ─────────────────────────────
// SEARCH
// ─────────────────────────────

function matchSearch(ch,q){

  if(!q) return true;

  const title =
  (ch.title || '')
  .toLowerCase();

  const user =
  (ch.username || '')
  .toLowerCase();

  const text =
  (ch.lastText || '')
  .toLowerCase();

  return (

    title.includes(q)

    ||

    user.includes(q)

    ||

    text.includes(q)

  );

}


// ─────────────────────────────
// DATE
// ─────────────────────────────

function formatDate(d){

  if(!d) return '';

  try{

    const dt =
    new Date(d);

    const now =
    new Date();

    const diff =
    (now-dt)/1000;

    if(diff < 60){
      return 'Just now';
    }

    if(diff < 3600){
      return Math.floor(diff/60)+'m ago';
    }

    if(diff < 86400){
      return Math.floor(diff/3600)+'h ago';
    }

    if(diff < 604800){
      return Math.floor(diff/86400)+'d ago';
    }

    return dt.toLocaleDateString();

  }catch(e){

    return '';

  }

}


// ─────────────────────────────
// PARSE
// ─────────────────────────────

function parseLastPost(html){

  const doc =
  new DOMParser()
  .parseFromString(
    html,
    'text/html'
  );

  const posts =
  doc.querySelectorAll(
    '.tgme_widget_message_wrap'
  );

  if(!posts.length){
    return null;
  }

  const last =
  posts[posts.length - 1];

  let text = '';

  const textEl =
  last.querySelector(
    '.tgme_widget_message_text'
  );

  if(textEl){
    text =
    textEl.innerHTML.trim();
  }

  let img = null;

  const imgEl =
  last.querySelector(
    '.tgme_widget_message_photo_wrap'
  );

  if(imgEl){

    const style =
    imgEl.getAttribute(
      'style'
    ) || '';

    const match =
    style.match(
      /url\(['"]?([^'")]+)['"]?\)/
    );

    if(match){
      img = match[1];
    }

  }

  let date = '';

  const dateEl =
  last.querySelector(
    '.tgme_widget_message_date time'
  );

  if(dateEl){

    date =
    dateEl.getAttribute(
      'datetime'
    ) || '';

  }

  let views = '';

  const viewEl =
  last.querySelector(
    '.tgme_widget_message_views'
  );

  if(viewEl){

    views =
    viewEl.textContent.trim();

  }

  return {

    text,
    img,
    date,
    views

  };

}


// ─────────────────────────────
// CARD
// ─────────────────────────────

function makeCard(channel,post){

  const card =
  document.createElement('div');

  card.className =
  'post-card';

  card.innerHTML = `

    <div class="post-head">

      <div
      class="avatar"
      style="
      background:
      linear-gradient(
      135deg,
      #0095f6,
      #7c3aed
      )
      "
      >

      ${(channel.title || channel.username)
      .slice(0,2)
      .toUpperCase()}

      </div>

      <div class="post-meta">

        <a
        class="post-channel"
        href="https://t.me/${channel.username}"
        target="_blank"
        >

        ${channel.title || channel.username}

        </a>

        <div class="post-date">

          ${formatDate(post.date)}

        </div>

      </div>

      <a
      class="open-btn"
      href="https://t.me/${channel.username}"
      target="_blank"
      >

      Open

      </a>

    </div>

    ${
      post.img

      ?

      `<img
      class="post-img"
      src="${post.img}"
      loading="lazy"
      >`

      :

      ''
    }

    ${
      post.text

      ?

      `<div class="post-text">

      ${post.text}

      </div>`

      :

      ''
    }
<div class="hashtags">

  ${
    extractTags(post.text)
    .map(tag=>

      `<span class="hashtag">
      #${tag}
      </span>`

    )
    .join('')
  }

</div>

    <div class="post-foot">

  <div class="stat">

    👁️ ${post.views || 0}

  </div>

  <button
  class="copy-btn"
  onclick="
  copyPost(
    '${channel.username}',
    '${channel.last_post_id}'
  )
  "
  >

  🔗 Copy

  </button>

</div>

  `;

  return card;

}


// ─────────────────────────────
// FETCH
// ─────────────────────────────

async function fetchOne(channel){

  if(CACHE.has(channel.username)){

    return CACHE.get(
      channel.username
    );

  }

  try{

    const res =
    await fetch(

      WORKER +
      channel.username,

      {
        signal:
        AbortSignal.timeout(4000)
      }

    );

    const html =
    await res.text();

    const post =
    parseLastPost(html);

const lower = (

  (
    post?.text || ''
  )

  +

  ' '

  +

  (
    channel.title || ''
  )

).toLowerCase();

const blocked =
NSFW_WORDS.some(
word =>
lower.includes(word)
);

if(blocked){

  return null;

}
    

    if(
      !post
      ||
      (
        !post.text
        &&
        !post.img
      )
    ){

      return null;

    }

    const lang =
    detectLang(
      post.text || ''
    );

    if(

      activeLang !== 'all'

      &&

      lang !== activeLang

    ){

      return null;

    }

    channel.lastText =
    (post.text || '')
    .replace(/<[^>]*>/g,'');

    channel.lastViews =
    parseInt(

      (post.views || '0')
      .replace(/[^\d]/g,'')

    ) || 0;

    const result = {

      channel,
      post

    };

    CACHE.set(
      channel.username,
      result
    );

    return result;

  }catch(e){

    return null;

  }

}


// ─────────────────────────────
// LOAD
// ─────────────────────────────

async function loadBatch(){

  if(
    isLoading
    ||
    poolIndex >= pool.length
  ){
    return;
  }

  isLoading = true;

  const slice =
  pool.slice(
    poolIndex,
    poolIndex + BATCH
  );

  poolIndex += BATCH;

  const fragment =
  document.createDocumentFragment();

  for(

    let i = 0;

    i < slice.length;

    i += CONCURRENT

  ){

    const group =
    slice.slice(
      i,
      i + CONCURRENT
    );

    const results =
    await Promise.allSettled(

      group.map(
        ch => fetchOne(ch)
      )

    );

    results.forEach(r => {

      if(

        r.status === 'fulfilled'

        &&

        r.value

      ){

        fragment.appendChild(

          makeCard(
            r.value.channel,
            r.value.post
          )

        );

      }

    });

  }

  document
  .getElementById('feed')
  .appendChild(fragment);

  isLoading = false;

}


// ─────────────────────────────
// SORT
// ─────────────────────────────

function buildPool(){

  let list =
  allChannels.filter(ch =>

    ch.username

    &&

    matchSearch(
      ch,
      searchQ
    )

  );

if(activeSort === 'newest'){

  list.sort((a,b)=>{

    const aScore =

      (a.last_post_timestamp || 0)

      +

      Math.random() * 86400000;

    const bScore =

      (b.last_post_timestamp || 0)

      +

      Math.random() * 86400000;

    return bScore - aScore;

  });

}
  

  if(activeSort === 'az'){

    list.sort(

      (a,b)=>

      (a.title || a.username)
      .localeCompare(
        b.title || b.username
      )

    );

  }

  if(activeSort === 'random'){

    list =
    list.sort(
      ()=>Math.random()-.5
    );

  }

if(activeSort === 'biggest'){

  list.sort(

    (a,b)=>

    (b.subscribers || 0)

    -

    (a.subscribers || 0)

  );

}

if(activeSort === 'growing'){

  list.sort((a,b)=>{

    const aRate =

      (a.last_post_views || 0)

      /

      Math.max(
        a.subscribers || 1,
        1
      );

    const bRate =

      (b.last_post_views || 0)

      /

      Math.max(
        b.subscribers || 1,
        1
      );

    return bRate - aRate;

  });

}

if(activeSort === 'gems'){

  list = list.filter(

    ch=>

    (ch.subscribers || 0)
    < 50000

  );

}

  if(activeSort === 'views'){

    list.sort(

      (a,b)=>

      (b.lastViews || 0)

      -

      (a.lastViews || 0)

    );

  }

  pool = list;

}


// ─────────────────────────────
// INIT
// ─────────────────────────────

function initFeed(){

  poolIndex = 0;

  document
  .getElementById('feed')
  .innerHTML = '';

  loadBatch();

}


// ─────────────────────────────
// APPLY
// ─────────────────────────────

function applyFilters(){

  buildPool();

  initFeed();

}


// ─────────────────────────────
// EVENTS
// ─────────────────────────────

document
.getElementById('search')
.addEventListener('input',e=>{

  searchQ =
  e.target.value
  .toLowerCase()
  .trim();

  applyFilters();

});

document
.getElementById('sortSelect')
.addEventListener('change',e=>{

  activeSort =
  e.target.value;

  applyFilters();

});

document
.getElementById('langSelect')
.addEventListener('change',e=>{

  activeLang =
  e.target.value;

  applyFilters();

});


// ─────────────────────────────
// SCROLL
// ─────────────────────────────

window.addEventListener('scroll',()=>{

  if(

    window.innerHeight
    +
    window.scrollY

    >=

    document.body.offsetHeight
    - 1800

  ){

    loadBatch();

  }

});


// ─────────────────────────────
// BOOT
// ─────────────────────────────

function copyPost(username,id){

  const url =
  `https://t.me/${username}/${id}`;

  navigator.clipboard.writeText(url);

  alert('Copied');

}

function extractTags(text){

  if(!text){
    return [];
  }

  const clean =
  text
  .replace(/<[^>]*>/g,'')
  .toLowerCase();

  const map = {

    Tech:[
      'ai',
      'python',
      'android',
      'coding'
    ],

    Crypto:[
      'bitcoin',
      'crypto',
      'btc'
    ],

    Games:[
      'pubg',
      'gaming',
      'ps5'
    ],

    Movies:[
      'movie',
      'film',
      'netflix'
    ],

    Sports:[
      'football',
      'soccer',
      'fifa'
    ]

  };

  const found = [];

  Object.entries(map)
  .forEach(([tag,words])=>{

    if(
      words.some(
        w=>clean.includes(w)
      )
    ){

      found.push(tag);

    }

  });

  return found.slice(0,3);

}

async function boot(){

  try{

    const r =
    await fetch(
      './channels_data.json'
    );

    allChannels =
    await r.json();

    allChannels =
    allChannels.filter(
      c=>c.username
    );

  }catch(e){

    allChannels = [];

  }

  document
  .getElementById('langSelect')
  .value = 'arabic';

  document
  .getElementById('sortSelect')
  .value = 'newest';

  applyFilters();

}

boot();

</script>
