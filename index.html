<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TELEPOSTS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f7fb;--surface:#fff;--border:#e5e9f0;
  --text:#111;--text2:#555;--text3:#9ca3af;
  --accent:#0095f6;--tag-bg:#eef2f7;
  --header-h:54px;--tags-h:46px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0a0a0a;--surface:#141414;--border:#242424;
    --text:#f0f0f0;--text2:#aaa;--text3:#555;--tag-bg:#1e1e1e;
  }
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ── */
.header{
  position:sticky;top:0;z-index:999;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  height:var(--header-h);
  display:flex;align-items:center;
  padding:0 14px;gap:10px;
}
@media(prefers-color-scheme:dark){
  .header{background:rgba(20,20,20,.92)}
}
.logo{font-size:18px;font-weight:700;flex-shrink:0;color:var(--text);letter-spacing:-.3px}
.logo span{color:var(--accent)}
.search-wrap{flex:1;position:relative;min-width:0}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;pointer-events:none}
.search{
  width:100%;padding:8px 10px 8px 32px;
  border:1.5px solid var(--border);border-radius:22px;
  background:var(--tag-bg);color:var(--text);
  font-size:13px;outline:none;font-family:'Inter',sans-serif;
  transition:border-color .2s;
}
.search:focus{border-color:var(--accent)}

/* sort + language selects */
.hdr-select{
  padding:7px 10px;border:1.5px solid var(--border);
  border-radius:22px;background:var(--tag-bg);color:var(--text);
  font-size:12px;font-weight:500;outline:none;cursor:pointer;
  font-family:'Inter',sans-serif;flex-shrink:0;
  transition:border-color .2s;
}
.hdr-select:focus{border-color:var(--accent)}

/* ── TAGS ── */
.tags-bar{
  position:sticky;top:var(--header-h);z-index:998;
  background:var(--surface);border-bottom:1px solid var(--border);
  height:var(--tags-h);
  display:flex;align-items:center;gap:6px;
  padding:0 12px;overflow-x:auto;scrollbar-width:none;
}
.tags-bar::-webkit-scrollbar{display:none}
.tag{
  flex-shrink:0;padding:5px 13px;border-radius:22px;
  font-size:12px;font-weight:500;cursor:pointer;
  background:var(--tag-bg);color:var(--text2);
  border:1.5px solid transparent;transition:all .15s;white-space:nowrap;
}
.tag:hover{border-color:var(--accent);color:var(--accent)}
.tag.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── FEED ── */
.feed{max-width:640px;margin:0 auto;padding:16px 12px 60px;display:flex;flex-direction:column;gap:16px}

/* ── CARD ── */
.post-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.04);
  animation:fadeUp .3s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.post-head{display:flex;align-items:center;gap:11px;padding:13px 14px 10px}
.avatar{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:14px;font-weight:700;flex-shrink:0;
}
.post-meta{flex:1;min-width:0}
.post-channel{
  font-size:14px;font-weight:700;color:var(--text);
  text-decoration:none;display:block;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.post-channel:hover{color:var(--accent)}
.post-date{font-size:11px;color:var(--text3);margin-top:2px}
.lang-badge{
  display:inline-block;margin-left:5px;
  font-size:10px;padding:1px 6px;border-radius:8px;
  background:var(--tag-bg);color:var(--text3);font-weight:600;
}
.open-btn{
  padding:7px 14px;border-radius:22px;
  background:var(--accent);color:#fff;
  text-decoration:none;font-size:12px;font-weight:700;
  flex-shrink:0;transition:opacity .2s;
}
.open-btn:hover{opacity:.85}

.post-img{width:100%;max-height:420px;object-fit:cover;display:block;background:var(--tag-bg)}

.post-text{
  padding:12px 14px;font-size:14px;line-height:1.65;
  word-break:break-word;color:var(--text);
}
.post-text a{color:var(--accent);text-decoration:none}
.post-text.clamped{
  display:-webkit-box;-webkit-line-clamp:5;
  -webkit-box-orient:vertical;overflow:hidden;
}
.read-more{
  padding:0 14px 10px;font-size:13px;
  color:var(--accent);cursor:pointer;display:block;
}

.post-foot{
  display:flex;align-items:center;gap:14px;
  padding:8px 14px 13px;border-top:1px solid var(--border);
}
.stat{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3)}
.stat svg{width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:1.8;stroke-linecap:round}

/* ── SKELETON ── */
.skeleton{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;overflow:hidden;padding:13px 14px;
  box-shadow:0 2px 12px rgba(0,0,0,.04);
}
.sk{background:var(--tag-bg);border-radius:8px;animation:sk 1.4s ease-in-out infinite}
@keyframes sk{0%,100%{opacity:1}50%{opacity:.35}}
.sk-row{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.sk-circle{width:42px;height:42px;border-radius:50%;flex-shrink:0}
.sk-img{width:100%;height:180px;border-radius:10px;margin-bottom:10px}

/* ── SENTINEL (infinite scroll trigger) ── */
#sentinel{height:1px}

/* ── SPINNER ── */
.spinner-wrap{padding:20px;text-align:center;display:none}
.spinner-wrap.active{display:block}
.spinner{
  width:28px;height:28px;border-radius:50%;
  border:3px solid var(--tag-bg);
  border-top-color:var(--accent);
  animation:spin .7s linear infinite;
  margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── EMPTY ── */
.empty{padding:60px 20px;text-align:center;color:var(--text3);font-size:14px}

/* ── NEWEST SORT NOTICE ── */
.sort-notice{
  text-align:center;font-size:12px;color:var(--text3);
  padding:8px 0 0;
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">TELE<span>POSTS</span></div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" class="search" placeholder="Search…" autocomplete="off">
  </div>
  <select id="sortSelect" class="hdr-select">
    <option value="random" selected>🔀 Random</option>
    <option value="newest">🕒 Newest</option>
    <option value="views">🔥 Views</option>
    <option value="az">🔤 A–Z</option>
  </select>
  <select id="langSelect" class="hdr-select">
    <option value="all">🌍 All</option>
    <option value="arabic">🇸🇦 AR</option>
    <option value="english">🇺🇸 EN</option>
    <option value="russian">🇷🇺 RU</option>
    <option value="turkish">🇹🇷 TR</option>
    <option value="persian">🇮🇷 FA</option>
    <option value="hebrew">🇮🇱 HE</option>
    <option value="other">🔡 Other</option>
  </select>
</header>

<div class="tags-bar" id="tagsBar"></div>

<div class="feed" id="feed">
  <div id="sentinel"></div>
</div>
<div class="spinner-wrap" id="spinnerWrap"><div class="spinner"></div></div>

<script>
const WORKER = 'https://telegram-proxy.mohamed-ahmed408408.workers.dev/?channel=';
const BATCH = 8;          // channels per load
const CONCURRENT = 4;     // parallel fetches at a time

const TAGS = [
  {id:'all',  label:'✨ All'},
  {id:'news', label:'📰 News',  kw:['news','نيوز','أخبار','akhbar','press','media','جريدة']},
  {id:'tech', label:'💻 Tech',  kw:['tech','تقنية','technology','dev','programming','برمجة']},
  {id:'sport',label:'⚽ Sport', kw:['sport','كورة','football','soccer','رياضة','yalla','يلا']},
  {id:'music',label:'🎵 Music', kw:['music','موسيقى','songs','اغاني','rap']},
  {id:'film', label:'🎬 Film',  kw:['film','movie','series','مسلسل','افلام','drama','سينما']},
  {id:'games',label:'🎮 Games', kw:['game','games','gaming','ppsspp','pubg','العاب','لعبة']},
  {id:'crypto',label:'💰 Crypto',kw:['crypto','bitcoin','btc','eth','coin','عملة','binance']},
  {id:'edu',  label:'📚 Edu',   kw:['edu','تعليم','learn','courses','كورس','tutorial']},
  {id:'fun',  label:'😂 Fun',   kw:['fun','meme','funny','ميم','نكتة','humor']},
  {id:'jobs', label:'💼 Jobs',  kw:['job','وظ','career','hire','recruitment','vacancy']},
];

// ── Language detection ────────────────────────────────────
function detectLang(text){
  if(!text) return 'unknown';
  const plain = text.replace(/<[^>]*>/g,'');
  if(/[\u0600-\u06FF]/.test(plain)){
    // Arabic vs Persian (Farsi uses ک پ گ چ ژ)
    if(/[پگچژکی]/.test(plain)) return 'persian';
    return 'arabic';
  }
  if(/[\u0590-\u05FF]/.test(plain)) return 'hebrew';
  if(/[А-Яа-яЁё]/.test(plain))    return 'russian';
  if(/[şğıüçöİĞŞ]/i.test(plain))   return 'turkish';
  if(/[a-z]/i.test(plain))          return 'english';
  return 'other';
}

// ── Helpers ───────────────────────────────────────────────
const GRADS = [
  ['#0095f6','#a855f7'],['#f59e0b','#ef4444'],['#10b981','#0ea5e9'],
  ['#8b5cf6','#ec4899'],['#06b6d4','#6366f1'],['#f97316','#eab308'],
];
function avatarGrad(u){
  let h=0; for(let c of(u||'')) h=(h*31+c.charCodeAt(0))&0xffffff;
  const p=GRADS[h%GRADS.length];
  return `linear-gradient(135deg,${p[0]},${p[1]})`;
}
function avatarText(t){
  if(!t) return '?';
  const w=t.trim().split(/\s+/);
  return w.length>=2?(w[0][0]+w[1][0]).toUpperCase():t.slice(0,2).toUpperCase();
}
function formatDate(d){
  if(!d) return '';
  try{
    const dt=new Date(d), now=new Date(), diff=(now-dt)/1000;
    if(diff<60)     return 'Just now';
    if(diff<3600)   return Math.floor(diff/60)+'m ago';
    if(diff<86400)  return Math.floor(diff/3600)+'h ago';
    if(diff<604800) return Math.floor(diff/86400)+'d ago';
    return dt.toLocaleDateString('en',{month:'short',day:'numeric',year:'numeric'});
  }catch(e){return ''}
}
function matchSearch(ch,q){
  if(!q) return true;
  return (ch.title||'').toLowerCase().includes(q)||(ch.username||'').toLowerCase().includes(q);
}
function matchTag(ch,tagId){
  if(tagId==='all') return true;
  const tag=TAGS.find(t=>t.id===tagId); if(!tag) return true;
  const hay=((ch.title||'')+(ch.username||'')).toLowerCase();
  return tag.kw.some(k=>hay.includes(k));
}

// ── Parse HTML → last post ────────────────────────────────
function parseLastPost(html){
  const doc = new DOMParser().parseFromString(html,'text/html');
  const posts = doc.querySelectorAll('.tgme_widget_message_wrap');
  if(!posts.length) return null;

  // Try last post first, fallback to any post with content
  let chosen = null;
  for(let i=posts.length-1;i>=0;i--){
    const p=posts[i];
    const hasText = p.querySelector('.tgme_widget_message_text');
    const hasImg  = p.querySelector('.tgme_widget_message_photo_wrap');
    if(hasText||hasImg){ chosen=p; break; }
  }
  if(!chosen) chosen=posts[posts.length-1];

  // text
  let text='';
  const textEl=chosen.querySelector('.tgme_widget_message_text');
  if(textEl) text=textEl.innerHTML.trim();

  // image — try photo, then video thumb, then sticker
  let img=null;
  const imgSelectors=[
    '.tgme_widget_message_photo_wrap',
    '.tgme_widget_message_video_thumb',
    '.tgme_widget_message_sticker_wrap',
  ];
  for(const sel of imgSelectors){
    const el=chosen.querySelector(sel);
    if(el){
      const style=el.getAttribute('style')||'';
      const m=style.match(/url\(['"]?([^'")\s]+)['"]?\)/);
      if(m){img=m[1];break;}
      // try <img> inside
      const imgTag=el.querySelector('img');
      if(imgTag){img=imgTag.src||imgTag.getAttribute('src');break;}
    }
  }

  // date (ISO datetime)
  let date='';
  const dateEl=chosen.querySelector('.tgme_widget_message_date time');
  if(dateEl) date=dateEl.getAttribute('datetime')||'';

  // views
  let views='';
  const viewEl=chosen.querySelector('.tgme_widget_message_views');
  if(viewEl) views=viewEl.textContent.trim();

  return {text,img,date,views};
}

// ── Skeleton ──────────────────────────────────────────────
function makeSkeleton(id){
  const d=document.createElement('div');
  d.className='skeleton'; d.id=id||'';
  d.innerHTML=`
    <div class="sk-row">
      <div class="sk sk-circle"></div>
      <div style="flex:1">
        <div class="sk" style="height:12px;width:55%;margin-bottom:7px"></div>
        <div class="sk" style="height:10px;width:30%"></div>
      </div>
    </div>
    <div class="sk sk-img"></div>
    <div class="sk" style="height:10px;width:90%;margin:10px 0 6px"></div>
    <div class="sk" style="height:10px;width:65%"></div>
  `;
  return d;
}

// ── Card ──────────────────────────────────────────────────
const LANG_FLAGS={'arabic':'🇸🇦','english':'🇺🇸','russian':'🇷🇺','turkish':'🇹🇷','persian':'🇮🇷','hebrew':'🇮🇱'};
function makeCard(channel,post){
  const {username,title}=channel;
  const card=document.createElement('div');
  card.className='post-card';
  const longText=post.text&&post.text.replace(/<[^>]*>/g,'').length>320;
  const flag=LANG_FLAGS[channel.detectedLang]||'';
  card.innerHTML=`
    <div class="post-head">
      <div class="avatar" style="background:${avatarGrad(username)}">${avatarText(title||username)}</div>
      <div class="post-meta">
        <a class="post-channel" href="https://t.me/${username}" target="_blank">
          ${title||username}${flag?`<span class="lang-badge">${flag}</span>`:''}
        </a>
        <div class="post-date">${formatDate(post.date)}</div>
      </div>
      <a class="open-btn" href="https://t.me/${username}" target="_blank">Open</a>
    </div>
    ${post.img?`<img class="post-img" src="${post.img}" loading="lazy" onerror="this.style.display='none'">` :''}
    ${post.text?`<div class="post-text${longText?' clamped':''}">${post.text}</div>${longText?`<span class="read-more">Read more ▾</span>`:''}`:''}
    <div class="post-foot">
      ${post.views?`<div class="stat"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>${post.views}</div>`:''}
      ${post.date?`<div class="stat"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${new Date(post.date).toLocaleDateString('en',{month:'short',day:'numeric'})}</div>`:''}
    </div>
  `;
  // read more
  const readMore=card.querySelector('.read-more');
  if(readMore){
    readMore.addEventListener('click',()=>{
      card.querySelector('.post-text').classList.remove('clamped');
      readMore.remove();
    });
  }
  return card;
}

// ── State ─────────────────────────────────────────────────
let allChannels=[];
let pool=[];           // current filtered+sorted pool (pending fetch)
let poolIndex=0;       // next index to fetch from pool
let isLoading=false;
let searchQ='';
let activeTag='all';
let activeLang='all';
let activeSort='random';

// For "newest" sort: we first fetch all, then re-sort and render
let newestMode=false;
let fetchedPosts=[];   // {channel, post} pairs collected during newest prefetch
let newestPrefetching=false;

// ── Insert card before sentinel ───────────────────────────
function appendCard(el){
  const feed=document.getElementById('feed');
  const sentinel=document.getElementById('sentinel');
  feed.insertBefore(el,sentinel);
}

// ── Fetch one channel, return {channel,post} or null ──────
async function fetchOne(channel){
  try{
    const res=await fetch(WORKER+channel.username,{signal:AbortSignal.timeout(9000)});
    const html=await res.text();
    const post=parseLastPost(html);
    if(!post||(!post.text&&!post.img)) return null;
    const lang=detectLang(post.text||'');
    channel.detectedLang=lang;
    channel.lastDate=post.date?new Date(post.date).getTime():0;
    channel.lastViews=parseInt((post.views||'0').replace(/[^\d]/g,''))||0;
    return {channel,post};
  }catch(e){return null;}
}

// ── Load next BATCH from pool (random/az/views modes) ─────
async function loadBatch(){
  if(isLoading||poolIndex>=pool.length) return;
  isLoading=true;
  showSpinner(true);

  // pick next BATCH
  const slice=pool.slice(poolIndex,poolIndex+BATCH);
  poolIndex+=BATCH;

  // fetch in groups of CONCURRENT
  for(let i=0;i<slice.length;i+=CONCURRENT){
    const group=slice.slice(i,i+CONCURRENT);
    const results=await Promise.allSettled(group.map(ch=>fetchOne(ch)));
    results.forEach(r=>{
      if(r.status==='fulfilled'&&r.value){
        const {channel,post}=r.value;
        // language filter — check after fetch (real content)
        if(activeLang!=='all'&&channel.detectedLang!==activeLang) return;
        appendCard(makeCard(channel,post));
      }
    });
  }

  isLoading=false;
  showSpinner(false);
}

// ── Newest mode: prefetch all → sort → render ─────────────
async function loadNewest(){
  if(newestPrefetching) return;
  newestPrefetching=true;
  showSpinner(true);

  const feed=document.getElementById('feed');
  // show notice
  const notice=document.createElement('div');
  notice.className='sort-notice';
  notice.id='newestNotice';
  notice.textContent='⏳ Fetching posts to sort by newest…';
  appendCard(notice);

  const batchSize=CONCURRENT*3;
  for(let i=0;i<pool.length;i+=batchSize){
    const group=pool.slice(i,i+batchSize);
    const results=await Promise.allSettled(group.map(ch=>fetchOne(ch)));
    results.forEach(r=>{
      if(r.status==='fulfilled'&&r.value){
        const {channel,post}=r.value;
        if(activeLang!=='all'&&channel.detectedLang!==activeLang) return;
        fetchedPosts.push({channel,post});
      }
    });
    // update notice
    const n=document.getElementById('newestNotice');
    if(n) n.textContent=`⏳ Loaded ${fetchedPosts.length} / ~${pool.length} posts…`;
  }

  // sort by date desc
  fetchedPosts.sort((a,b)=>(b.channel.lastDate||0)-(a.channel.lastDate||0));

  // clear feed and render sorted
  feed.innerHTML='<div id="sentinel"></div>';
  setupSentinel();
  fetchedPosts.forEach(({channel,post})=>appendCard(makeCard(channel,post)));

  showSpinner(false);
  newestPrefetching=false;
}

// ── Spinner ───────────────────────────────────────────────
function showSpinner(v){
  document.getElementById('spinnerWrap').classList.toggle('active',v);
}

// ── Init feed ─────────────────────────────────────────────
function initFeed(){
  poolIndex=0;
  fetchedPosts=[];
  newestPrefetching=false;
  isLoading=false;

  const feed=document.getElementById('feed');
  feed.innerHTML='<div id="sentinel"></div>';
  setupSentinel();

  if(activeSort==='newest'){
    newestMode=true;
    loadNewest();
  } else {
    newestMode=false;
    loadBatch();
  }
}

// ── Infinite scroll via IntersectionObserver ──────────────
let sentinelObserver=null;
function setupSentinel(){
  if(sentinelObserver) sentinelObserver.disconnect();
  sentinelObserver=new IntersectionObserver(entries=>{
    if(entries[0].isIntersecting&&!isLoading&&!newestPrefetching){
      if(!newestMode) loadBatch();
    }
  },{rootMargin:'300px'});
  const s=document.getElementById('sentinel');
  if(s) sentinelObserver.observe(s);
}

// ── Build pool from allChannels ───────────────────────────
function buildPool(){
  let list=allChannels.filter(ch=>
    ch.username&&
    matchSearch(ch,searchQ)&&
    matchTag(ch,activeTag)
  );
  if(activeSort==='random') list=list.sort(()=>Math.random()-.5);
  if(activeSort==='az')     list=list.sort((a,b)=>(a.title||a.username).localeCompare(b.title||b.username));
  // views + newest: pool stays random order initially, sorting happens after fetch
  pool=list;
}

// ── Apply all filters → rebuild → init ───────────────────
function applyFilters(){
  buildPool();
  initFeed();
}

// ── Tags ──────────────────────────────────────────────────
function buildTags(){
  const bar=document.getElementById('tagsBar');
  TAGS.forEach(tag=>{
    const btn=document.createElement('button');
    btn.className='tag'+(tag.id==='all'?' active':'');
    btn.textContent=tag.label;
    btn.onclick=()=>{
      document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active'));
      btn.classList.add('active');
      activeTag=tag.id;
      applyFilters();
    };
    bar.appendChild(btn);
  });
}

// ── Events ────────────────────────────────────────────────
document.getElementById('search').addEventListener('input',e=>{
  searchQ=e.target.value.toLowerCase().trim();
  applyFilters();
});
document.getElementById('sortSelect').addEventListener('change',e=>{
  activeSort=e.target.value;
  applyFilters();
});
document.getElementById('langSelect').addEventListener('change',e=>{
  activeLang=e.target.value;
  applyFilters();
});

// ── Boot ──────────────────────────────────────────────────
async function boot(){
  try{
    const r=await fetch('./channels_data.json');
    allChannels=await r.json();
    allChannels=allChannels.filter(c=>c.username);
  }catch(e){allChannels=[];}
  buildTags();
  applyFilters();
}

boot();
</script>
